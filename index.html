<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1e3c72">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <title>Цитаты и Время</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        :root {
            --bg-color: #0f1016;
            --card-bg: rgba(255, 255, 255, 0.08);
            --card-border: rgba(255, 255, 255, 0.12);
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.6);
            --accent-red: #ff3b30;
            --accent-green: #34c759;
            --accent-gold: #ffd60a;
            --accent-blue: #007aff;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            padding: 12px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            gap: 12px;
            color: var(--text-primary);
            overflow: hidden;
        }

        .quote-card {
            position: relative;
            border-radius: 30px;
            overflow: hidden;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            background-color: #000;
            border: 1px solid var(--card-border);
        }

        #bgLayer {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center;
            z-index: 0;
            transition: opacity 1s ease;
            opacity: 0;
        }

        #bgLayer.loaded { opacity: 1; }

        .quote-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.4) 45%, transparent 100%);
            z-index: 1;
        }

        .quote-content {
            position: relative;
            z-index: 2;
            padding: 32px 24px;
            opacity: 0;
            transition: opacity 0.6s ease;
        }

        .quote-content.visible { opacity: 1; }

        .quote-text {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 1.5rem;
            line-height: 1.3;
            margin-bottom: 12px;
            color: #fff;
        }

        .quote-author {
            font-size: 0.9rem;
            text-align: right;
            font-weight: 600;
            color: var(--text-secondary);
        }

        #loaderOverlay {
            position: absolute;
            inset: 0;
            background: #000;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.4s ease;
        }

        .btn-ui {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            padding: 14px;
            border-radius: 18px;
            color: var(--text-primary);
            font-weight: 600;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            backdrop-filter: blur(10px);
        }

        .tracker-section {
            background: var(--card-bg);
            border-radius: 28px;
            padding: 20px;
            border: 1px solid var(--card-border);
            display: flex; flex-direction: column; gap: 16px;
        }

        .tracker-controls { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

        .btn-work {
            padding: 16px; border-radius: 18px; border: none;
            color: white; font-weight: 800; cursor: pointer;
            font-size: 0.9rem;
            transition: background 0.2s, opacity 0.2s;
        }

        .btn-start { background: var(--accent-red); }
        .btn-start:disabled { opacity: 0.3; cursor: default; }
        
        .btn-stop { background: rgba(255,255,255,0.1); color: var(--text-secondary); }
        .btn-stop.active-stop { background: var(--accent-green) !important; color: white !important; }

        .timer-display {
            font-size: 3.2rem; font-weight: 800; text-align: center;
            color: var(--accent-gold); font-family: monospace;
        }

        .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .stat-box { 
            background: rgba(0,0,0,0.3); 
            padding: 12px 4px; 
            border-radius: 18px; 
            text-align: center; 
            border: 1px solid rgba(255,255,255,0.05);
        }
        .stat-label { font-size: 0.55rem; opacity: 0.5; margin-bottom: 4px; font-weight: 800; text-transform: uppercase; }
        .stat-val { font-weight: 800; font-size: 0.95rem; color: #fff; }
        
        .stat-progress-wrap {
            width: 80%; height: 3px; background: rgba(255,255,255,0.1);
            border-radius: 2px; margin: 8px auto 0 auto; overflow: hidden;
        }
        .stat-progress-bar { height: 100%; width: 0%; transition: width 1s; }

        #toast {
            position: fixed; bottom: 20%; left: 50%; transform: translateX(-50%);
            background: #fff; color: #000; padding: 10px 20px;
            border-radius: 20px; font-weight: 700; opacity: 0; transition: 0.3s;
            z-index: 1000; pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="quote-card" id="quoteCard">
        <div id="bgLayer"></div>
        <div id="loaderOverlay"><div style="color:var(--accent-gold); font-size:0.8rem; font-weight:700;">ЗАГРУЗКА...</div></div>
        <div class="quote-content" id="qContent">
            <div class="quote-text" id="qText">...</div>
            <div class="quote-author" id="qAuthor"></div>
        </div>
    </div>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
        <button class="btn-ui" onclick="newQuote()">🎲 Цитата</button>
        <button class="btn-ui" onclick="saveAsImage()">💾 Скрин</button>
    </div>

    <div class="tracker-section">
        <div class="tracker-controls">
            <button class="btn-work btn-start" id="startBtn" onclick="startCounter()">👔 К ШЕФУ</button>
            <button class="btn-work btn-stop" id="stopBtn" onclick="stopCounter()" disabled>🕊️ СВОБОДЕН</button>
        </div>
        <div class="timer-display" id="timer">00:00:00</div>
        <div class="stats-row">
            <div class="stat-box">
                <div class="stat-label">Сегодня</div>
                <div class="stat-val" id="sDay">00:00:00</div>
                <div class="stat-progress-wrap"><div class="stat-progress-bar" id="pDay" style="background:var(--accent-gold)"></div></div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Неделя</div>
                <div class="stat-val" id="sWeek">00:00</div>
                <div class="stat-progress-wrap"><div class="stat-progress-bar" id="pWeek" style="background:var(--accent-green)"></div></div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Всего</div>
                <div class="stat-val" id="sTotal">0 дн.</div>
                <div class="stat-progress-wrap"><div class="stat-progress-bar" id="pTotal" style="background:var(--accent-blue); width:100%"></div></div>
            </div>
        </div>
    </div>

    <div id="toast"></div>

    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <script>
        let startTime = null, timerId = null;
        const storage = JSON.parse(localStorage.getItem('time_data')) || { total: 0, history: [] };
        const WORK_DAY_SEC = 9 * 3600;

        function formatFullTime(seconds) {
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = seconds % 60;
            return [h, m, s].map(v => v.toString().padStart(2, '0')).join(':');
        }

        function formatHHMM(seconds) {
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            return `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}`;
        }

        function msg(t) {
            const el = document.getElementById('toast');
            el.textContent = t; el.style.opacity = 1;
            setTimeout(() => el.style.opacity = 0, 2000);
        }

        async function newQuote() {
            const overlay = document.getElementById('loaderOverlay');
            const bg = document.getElementById('bgLayer');
            const content = document.getElementById('qContent');
            overlay.style.opacity = '1';
            content.classList.remove('visible');
            bg.classList.remove('loaded');

            try {
                const res = await fetch('https://api.allorigins.win/get?url=' + encodeURIComponent('http://api.forismatic.com/api/1.0/?method=getQuote&format=json&lang=ru'));
                const d = await res.json();
                const q = JSON.parse(d.contents);
                document.getElementById('qText').textContent = q.quoteText;
                document.getElementById('qAuthor').textContent = "— " + (q.quoteAuthor || "Автор неизвестен");
            } catch(e) {
                document.getElementById('qText').textContent = "Ваше время ограничено, не тратьте его, живя чужой жизнью.";
                document.getElementById('qAuthor').textContent = "— Стив Джобс";
            }

            const imgUrl = `https://picsum.photos/800/1200?random=${Math.random()}`;
            const img = new Image();
            img.crossOrigin = "anonymous";
            img.src = imgUrl;
            img.onload = () => {
                bg.style.backgroundImage = `url('${imgUrl}')`;
                bg.classList.add('loaded');
                overlay.style.opacity = '0';
                content.classList.add('visible');
            };
        }

        function startCounter() {
            if (timerId) return;
            startTime = Date.now();
            localStorage.setItem('active_start', startTime);
            
            document.getElementById('startBtn').disabled = true;
            const stopBtn = document.getElementById('stopBtn');
            stopBtn.disabled = false;
            stopBtn.classList.add('active-stop');

            timerId = setInterval(() => {
                const s = Math.floor((Date.now() - startTime) / 1000);
                document.getElementById('timer').textContent = formatFullTime(s);
            }, 1000);
        }

        function stopCounter() {
            if (!startTime) return;
            const diff = Math.floor((Date.now() - startTime) / 1000);
            clearInterval(timerId);
            timerId = null;
            
            storage.total += diff;
            storage.history.push({ d: new Date().toDateString(), v: diff, ts: Date.now() });
            localStorage.setItem('time_data', JSON.stringify(storage));
            localStorage.removeItem('active_start');
            location.reload();
        }

        function saveAsImage() {
            msg("Создаем фото...");
            const card = document.getElementById('quoteCard');
            html2canvas(card, { useCORS: true, scale: 2 }).then(canvas => {
                const link = document.createElement('a');
                link.download = `focus_${Date.now()}.png`;
                link.href = canvas.toDataURL();
                link.click();
                msg("Готово!");
            });
        }

        window.onload = () => {
            newQuote();
            const todayStr = new Date().toDateString();
            
            // Сегодня ЧЧ:ММ:СС
            const daySec = storage.history.filter(i => i.d === todayStr).reduce((a, b) => a + b.v, 0);
            document.getElementById('sDay').textContent = formatFullTime(daySec);
            document.getElementById('pDay').style.width = Math.min(100, (daySec / WORK_DAY_SEC) * 100) + '%';
            
            // Неделя ЧЧ:ММ
            const weekAgo = Date.now() - (7 * 24 * 3600 * 1000);
            const weekTotal = storage.history.filter(i => (i.ts || 0) > weekAgo).reduce((a, b) => a + b.v, 0);
            document.getElementById('sWeek').textContent = formatHHMM(weekTotal);
            document.getElementById('pWeek').style.width = Math.min(100, (weekTotal / (WORK_DAY_SEC * 5)) * 100) + '%';
            
            // Всего Дни
            const uniqueDays = new Set(storage.history.map(i => i.d)).size;
            document.getElementById('sTotal').textContent = uniqueDays + ' дн.';

            const active = localStorage.getItem('active_start');
            if(active) {
                startTime = parseInt(active);
                document.getElementById('startBtn').disabled = true;
                const stopBtn = document.getElementById('stopBtn');
                stopBtn.disabled = false;
                stopBtn.classList.add('active-stop');
                timerId = setInterval(() => {
                    const s = Math.floor((Date.now() - startTime) / 1000);
                    document.getElementById('timer').textContent = formatFullTime(s);
                }, 1000);
            }
        };
    </script>
</body>
</html>
