<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#000000">
    <meta name="description" content="Мотивирующие цитаты с трекером времени">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Цитаты">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <title>Цитаты</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-gradient-1: #1a1a2e;
            --bg-gradient-2: #16213e;
            --card-bg: rgba(255, 255, 255, 0.08);
            --card-border: rgba(255, 255, 255, 0.15);
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.7);
            --button-bg: rgba(255, 255, 255, 0.12);
            --button-hover: rgba(255, 255, 255, 0.2);
            --accent-red: #ff3b30;
            --accent-green: #34c759;
            --accent-gold: #ffd60a;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            --glow-red: rgba(255, 59, 48, 0.4);
            --glow-green: rgba(52, 199, 89, 0.4);
        }

        [data-theme="light"] {
            --bg-gradient-1: #f0f4f8;
            --bg-gradient-2: #d9e2ec;
            --card-bg: rgba(255, 255, 255, 0.65);
            --card-border: rgba(255, 255, 255, 0.5);
            --text-primary: #1a1a2e;
            --text-secondary: rgba(26, 26, 46, 0.7);
            --button-bg: rgba(255, 255, 255, 0.5);
            --button-hover: rgba(255, 255, 255, 0.7);
            --accent-gold: #b8860b;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        html, body { height: 100%; overflow: hidden; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
            background: linear-gradient(135deg, var(--bg-gradient-1) 0%, var(--bg-gradient-2) 100%);
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            transition: all 0.5s ease;
        }

        .quote-card {
            position: relative;
            border-radius: 24px;
            box-shadow: var(--shadow), inset 0 1px 0 var(--card-border);
            overflow: hidden;
            flex: 1;
            min-height: 0;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            background-size: cover;
            background-position: center;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            transition: all 0.5s ease;
        }

        .quote-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.5) 50%, rgba(0,0,0,0.1) 100%);
            z-index: 1;
        }

        [data-theme="light"] .quote-card::before {
            background: linear-gradient(to top, rgba(0,0,0,0.6) 0%, rgba(0,0,0,0.2) 50%, rgba(0,0,0,0.05) 100%);
        }

        .quote-card::after {
            content: '"';
            position: absolute;
            top: 15px; left: 20px;
            font-size: 7rem;
            font-family: 'Playfair Display', serif;
            color: rgba(255, 255, 255, 0.1);
            z-index: 2;
        }

        .quote-content {
            position: relative;
            z-index: 3;
            padding: 24px;
        }

        .quote-text {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 1.35rem;
            color: var(--text-primary);
            line-height: 1.5;
            margin-bottom: 12px;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
        }

        .quote-author {
            color: var(--text-secondary);
            font-size: 0.95rem;
            text-align: right;
            font-weight: 600;
        }

        .quote-author::before { content: '— '; }

        .translation-badge {
            position: absolute;
            top: 12px; right: 12px;
            background: rgba(255, 214, 10, 0.9);
            color: #000;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.7rem;
            font-weight: 700;
            z-index: 4;
            display: none;
        }

        .translation-badge.visible { display: block; }

        .main-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .btn {
            background: var(--button-bg);
            border: 1px solid var(--card-border);
            padding: 16px 20px;
            border-radius: 16px;
            color: var(--text-primary);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn:hover {
            background: var(--button-hover);
            transform: translateY(-2px) scale(1.02);
        }

        .btn:active { transform: translateY(0) scale(0.98); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .time-tracker {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 14px;
            border: 1px solid var(--card-border);
            box-shadow: var(--shadow), inset 0 1px 0 var(--card-border);
        }

        .tracker-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 10px;
        }

        .tracker-btn {
            padding: 14px 18px;
            border-radius: 14px;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
            position: relative;
            overflow: hidden;
        }

        .tracker-btn.start {
            background: linear-gradient(135deg, var(--accent-red) 0%, #d70015 100%);
            color: white;
            box-shadow: 0 4px 20px var(--glow-red);
        }

        .tracker-btn.start:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px var(--glow-red);
        }

        .tracker-btn.stop {
            background: linear-gradient(135deg, var(--accent-green) 0%, #248a3d 100%);
            color: white;
            box-shadow: 0 4px 20px var(--glow-green);
        }

        .tracker-btn.stop:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px var(--glow-green);
        }

        .tracker-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; }

        .tracker-btn.active { animation: pulse-glow 2s infinite; }

        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 4px 20px var(--glow-red); transform: scale(1); }
            50% { box-shadow: 0 8px 35px var(--glow-red); transform: scale(1.02); }
        }

        .lost-time-display { text-align: center; margin-bottom: 10px; }

        .lost-time-value {
            color: var(--accent-gold);
            font-size: 2rem;
            font-weight: 700;
            font-family: -apple-system, BlinkMacSystemFont, monospace;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
            letter-spacing: 2px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }

        .stat-item {
            text-align: center;
            background: rgba(0, 0, 0, 0.15);
            padding: 8px;
            border-radius: 12px;
            border: 1px solid var(--card-border);
            backdrop-filter: blur(10px);
        }

        [data-theme="light"] .stat-item { background: rgba(255, 255, 255, 0.4); }

        .stat-label { color: var(--text-secondary); font-size: 0.7rem; margin-bottom: 4px; font-weight: 500; }
        .stat-value { color: var(--text-primary); font-size: 0.9rem; font-weight: 600; }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--card-bg);
            color: var(--text-primary);
            padding: 14px 28px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.95rem;
            box-shadow: var(--shadow);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1000;
            border: 1px solid var(--card-border);
        }

        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
        .toast.success { background: rgba(52, 199, 89, 0.9); color: white; }
        .toast.error { background: rgba(255, 59, 48, 0.9); color: white; }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .quote-card.animate { animation: fadeIn 0.5s ease; }

        .loading {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 9999;
            backdrop-filter: blur(10px);
        }

        .loading.active { display: flex; }

        .spinner {
            width: 50px; height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.2);
            border-top: 4px solid var(--accent-gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 15px;
        }

        .loading-text { color: white; font-size: 1rem; font-weight: 600; }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .theme-toggle {
            position: fixed;
            top: 15px; right: 15px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            padding: 10px 14px;
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 1.3rem;
            cursor: pointer;
            backdrop-filter: blur(20px);
            transition: all 0.3s ease;
            box-shadow: var(--shadow);
            z-index: 100;
        }

        .theme-toggle:hover { transform: scale(1.1); background: var(--button-hover); }
    </style>
</head>
<body>
    <button class="theme-toggle" onclick="toggleTheme()" title="Переключить тему">🌓</button>

    <div class="loading" id="loading">
        <div class="spinner"></div>
        <div class="loading-text" id="loadingText">Загрузка...</div>
    </div>

    <div class="quote-card" id="quoteCard">
        <div class="translation-badge" id="transBadge">ПЕРЕВЕДЕНО</div>
        <div class="quote-content">
            <div class="quote-text" id="quoteText">Нажмите «Новая цитата», чтобы начать!</div>
            <div class="quote-author" id="quoteAuthor">Автор</div>
        </div>
    </div>

    <div class="main-buttons">
        <button class="btn" onclick="generateQuote()" id="generateBtn">🎲 Новая</button>
        <button class="btn" onclick="downloadImage()" id="downloadBtn">💾 Скачать</button>
    </div>

    <div class="time-tracker">
        <div class="tracker-buttons">
            <button class="tracker-btn start" id="btnStart" onclick="startTimer()">👔 К шефу</button>
            <button class="tracker-btn stop" id="btnStop" onclick="stopTimer()" disabled>🕊️ Свободен</button>
        </div>
        <div class="lost-time-display">
            <div class="lost-time-value" id="totalLostTime">00:00:00</div>
        </div>
        <div class="stats-grid">
            <div class="stat-item">
                <div class="stat-label">Сегодня</div>
                <div class="stat-value" id="statToday">0 мин</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">Неделя</div>
                <div class="stat-value" id="statWeek">0 мин</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">Всего</div>
                <div class="stat-value" id="statTotal">0 мин</div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast">Готово!</div>

    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <script>
        // ==================== АУДИО КОНТЕКСТ ====================
        let audioContext = null;

        function initAudio() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        // ==================== ЗВУКОВЫЕ ЭФФЕКТЫ ====================
        function playBossSound() {
            initAudio();
            if (audioContext.state === 'suspended') audioContext.resume();
            
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            oscillator.frequency.setValueAtTime(300, audioContext.currentTime);
            oscillator.frequency.exponentialRampToValueAtTime(150, audioContext.currentTime + 0.3);
            
            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.3);
            
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.3);
        }

        function playFreeSound() {
            initAudio();
            if (audioContext.state === 'suspended') audioContext.resume();
            
            const notes = [523.25, 659.25, 783.99];
            
            notes.forEach((freq, index) => {
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();
                
                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);
                
                oscillator.frequency.value = freq;
                oscillator.type = 'sine';
                
                const startTime = audioContext.currentTime + (index * 0.05);
                gainNode.gain.setValueAtTime(0, startTime);
                gainNode.gain.linearRampToValueAtTime(0.2, startTime + 0.05);
                gainNode.gain.exponentialRampToValueAtTime(0.01, startTime + 0.4);
                
                oscillator.start(startTime);
                oscillator.stop(startTime + 0.4);
            });
        }

        // ==================== ТЕМА ====================
        function getSystemTheme() {
            return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }

        function setTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
            const metaColor = document.querySelector('meta[name="theme-color"]');
            if (metaColor) {
                metaColor.setAttribute('content', theme === 'dark' ? '#000000' : '#ffffff');
            }
        }

        function toggleTheme() {
            const current = document.documentElement.getAttribute('data-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            setTheme(next);
        }

        function initTheme() {
            const saved = localStorage.getItem('theme');
            if (saved) { setTheme(saved); }
            else { setTheme(getSystemTheme()); }
        }

        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', (e) => {
            const saved = localStorage.getItem('theme');
            if (!saved) { setTheme(e.matches ? 'dark' : 'light'); }
        });

        // ==================== ЦИТАТЫ ====================

const quoteAPIs = [
    {
        name: 'Forismatic',
        url: 'https://api.forismatic.com/api/1.0/?method=getQuote&format=json&lang=en',
        parse: (data) => ({
            text: data.quoteText,
            author: data.quoteAuthor,
            originalLang: 'en'
        })
    },
    {
        name: 'Quotable',
        url: 'https://api.quotable.io/random',
        parse: (data) => ({
            text: data.content,
            author: data.author,
            originalLang: 'en'
        })
    },
    {
        name: 'Stoic',
        url: 'https://stoic.tekloon.net/stoic-quote',
        parse: (data) => ({
            text: data.quote,
            author: data.author || 'Стоический философ',
            originalLang: 'en'
        })
    }
];

        let currentQuote = null;
        let isOnline = navigator.onLine;

        window.addEventListener('online', () => { isOnline = navigator.onLine; });
        window.addEventListener('offline', () => { isOnline = navigator.onLine; });

        async function translateText(text, from = 'en', to = 'ru') {
            if (from === to) return text;
            try {
                const encodedText = encodeURIComponent(text);
                const url = `https://api.mymemory.translated.net/get?q=${encodedText}&langpair=${from}|${to}`;
                const response = await fetch(url);
                const data = await response.json();
                if (data.responseStatus === 200 && data.responseData.translatedText) {
                    return data.responseData.translatedText;
                }
                throw new Error('Translation failed');
            } catch (error) {
                return text;
            }
        }

        async function fetchQuoteFromAPI() {
            for (const api of quoteAPIs) {
                try {
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), 5000);
                    const response = await fetch(api.url, { signal: controller.signal, headers: { 'Accept': 'application/json' } });
                    clearTimeout(timeoutId);
                    if (!response.ok) throw new Error(`${api.name} returned ${response.status}`);
                    const data = await response.json();
                    return api.parse(data);
                } catch (error) {
                    console.warn(`${api.name} не сработал:`, error.message);
                }
            }
            return fallbackQuotes[Math.floor(Math.random() * fallbackQuotes.length)];
        }

        async function generateQuote() {
            const loading = document.getElementById('loading');
            const generateBtn = document.getElementById('generateBtn');
            
            loading.classList.add('active');
            generateBtn.disabled = true;
            
            try {
                let quoteData = await fetchQuoteFromAPI();
                
                const picsumUrl = `https://picsum.photos/1920/1080?random=${Date.now()}`;
                await new Promise((resolve) => {
                    const img = new Image();
                    img.onload = () => {
                        document.getElementById('quoteCard').style.backgroundImage = `url('${picsumUrl}')`;
                        resolve();
                    };
                    img.onerror = resolve;
                    img.src = picsumUrl;
                });
                
                if (quoteData.originalLang === 'en') {
                    try {
                        const translated = await translateText(quoteData.text, 'en', 'ru');
                        quoteData.translatedText = translated;
                    } catch (e) { quoteData.translatedText = null; }
                }
                
                currentQuote = quoteData;
                displayQuote(quoteData);
                
                if (!isOnline) showToast('Офлайн режим', 'error');
            } catch (error) {
                currentQuote = fallbackQuotes[Math.floor(Math.random() * fallbackQuotes.length)];
                displayQuote(currentQuote);
            } finally {
                loading.classList.remove('active');
                generateBtn.disabled = false;
            }
        }

        function displayQuote(quote) {
            const quoteText = document.getElementById('quoteText');
            const quoteAuthor = document.getElementById('quoteAuthor');
            const transBadge = document.getElementById('transBadge');
            const quoteCard = document.getElementById('quoteCard');
            
            quoteCard.classList.remove('animate');
            void quoteCard.offsetWidth;
            quoteCard.classList.add('animate');
            
            let displayText = quote.text;
            let isTranslated = false;
            
            if (quote.originalLang === 'en' && quote.translatedText) {
                displayText = quote.translatedText;
                isTranslated = true;
            }
            
            quoteText.textContent = displayText;
            quoteAuthor.textContent = quote.author;
            transBadge.classList.toggle('visible', isTranslated);
        }

        function downloadImage() {
            if (!currentQuote) { showToast("Сначала получите цитату!", 'error'); return; }
            
            html2canvas(document.getElementById('quoteCard'), {
                backgroundColor: null, scale: 2, useCORS: true, allowTaint: true, logging: false
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = `цитата-${Date.now()}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
                showToast("Скачано!", 'success');
            }).catch(() => { showToast("Ошибка!", 'error'); });
        }

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast show ${type}`;
            setTimeout(() => { toast.classList.remove('show'); }, 2000);
        }

        // ==================== ТРЕКЕР ВРЕМЕНИ ====================
        let timerInterval = null;
        let timerStartTime = null;
        let isTimerRunning = false;
        let timeData = JSON.parse(localStorage.getItem('timeTrackerData')) || { totalSeconds: 0, sessions: [] };

        function formatTime(seconds) {
            const hrs = Math.floor(seconds / 3600);
            const mins = Math.floor((seconds % 3600) / 60);
            const secs = seconds % 60;
            return `${String(hrs).padStart(2, '0')}:${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
        }

        function formatTimeShort(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
        }

        function updateTimeDisplay() {
            document.getElementById('totalLostTime').textContent = formatTime(timeData.totalSeconds);
        }

        function updateStats() {
            const now = new Date();
            const todayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
            const weekStart = new Date(now.setDate(now.getDate() - now.getDay())).getTime();

            let todaySeconds = 0, weekSeconds = 0;

            timeData.sessions.forEach(session => {
                if (session.end) {
                    if (session.start >= todayStart) todaySeconds += session.duration;
                    if (session.start >= weekStart) weekSeconds += session.duration;
                }
            });

            document.getElementById('statToday').textContent = formatTimeShort(todaySeconds);
            document.getElementById('statWeek').textContent = formatTimeShort(weekSeconds);
            document.getElementById('statTotal').textContent = formatTimeShort(timeData.totalSeconds);
        }

        function startTimer() {
            if (isTimerRunning) return;
            
            playBossSound(); // 🔊 ЗВУК!
            
            timerStartTime = Date.now();
            isTimerRunning = true;
            localStorage.setItem('activeTimer', timerStartTime.toString());
            
            document.getElementById('btnStart').disabled = true;
            document.getElementById('btnStop').disabled = false;
            document.getElementById('btnStart').classList.add('active');
            
            startTimerDisplay();
            showToast('Таймер запущен!', 'success');
        }

        function startTimerDisplay() {
            timerInterval = setInterval(() => {
                const elapsed = Math.floor((Date.now() - timerStartTime) / 1000);
                document.getElementById('totalLostTime').textContent = formatTimeShort(elapsed);
            }, 1000);
        }

        function stopTimer() {
            if (!isTimerRunning) return;
            
            playFreeSound(); // 🔊 ЗВУК!
            
            const endTime = Date.now();
            const duration = Math.floor((endTime - timerStartTime) / 1000);
            
            timeData.sessions.push({ start: timerStartTime, end: endTime, duration, date: new Date().toISOString() });
            timeData.totalSeconds += duration;
            
            localStorage.setItem('timeTrackerData', JSON.stringify(timeData));
            localStorage.removeItem('activeTimer');
            
            clearInterval(timerInterval);
            isTimerRunning = false;
            timerStartTime = null;
            
            document.getElementById('btnStart').disabled = false;
            document.getElementById('btnStop').disabled = true;
            document.getElementById('btnStart').classList.remove('active');
            
            updateTimeDisplay();
            updateStats();
            showToast(`Записано ${formatTimeShort(duration)}`, 'success');
        }

        window.addEventListener('beforeunload', () => {
            if (isTimerRunning && timerStartTime) {
                localStorage.setItem('activeTimer', timerStartTime.toString());
            }
        });

        // ==================== ИНИЦИАЛИЗАЦИЯ ====================
        document.addEventListener('DOMContentLoaded', () => {
            initTheme();
            updateTimeDisplay();
            updateStats();
            
            const savedTimer = localStorage.getItem('activeTimer');
            if (savedTimer) {
                const startTime = parseInt(savedTimer);
                if (!isNaN(startTime)) {
                    timerStartTime = startTime;
                    isTimerRunning = true;
                    startTimerDisplay();
                }
            }
        });
    </script>
</body>
</html>
