<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#000000">
    <meta name="description" content="Мотивирующие цитаты с трекером времени">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Цитаты">
    
    <!-- Шрифты -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <title>Цитаты и Время</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-gradient-1: #1a1a2e;
            --bg-gradient-2: #16213e;
            --card-bg: rgba(255, 255, 255, 0.08);
            --card-border: rgba(255, 255, 255, 0.15);
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.7);
            --button-bg: rgba(255, 255, 255, 0.12);
            --button-hover: rgba(255, 255, 255, 0.2);
            --accent-red: #ff3b30;
            --accent-green: #34c759;
            --accent-gold: #ffd60a;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            --glow-red: rgba(255, 59, 48, 0.4);
            --glow-green: rgba(52, 199, 89, 0.4);
        }

        [data-theme="light"] {
            --bg-gradient-1: #f0f4f8;
            --bg-gradient-2: #d9e2ec;
            --card-bg: rgba(255, 255, 255, 0.65);
            --card-border: rgba(255, 255, 255, 0.5);
            --text-primary: #1a1a2e;
            --text-secondary: rgba(26, 26, 46, 0.7);
            --button-bg: rgba(255, 255, 255, 0.5);
            --button-hover: rgba(255, 255, 255, 0.7);
            --accent-gold: #b8860b;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        html, body { height: 100%; overflow: hidden; }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: linear-gradient(135deg, var(--bg-gradient-1) 0%, var(--bg-gradient-2) 100%);
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            transition: all 0.5s ease;
        }

        .quote-card {
            position: relative;
            border-radius: 24px;
            box-shadow: var(--shadow), inset 0 1px 0 var(--card-border);
            overflow: hidden;
            flex: 1;
            min-height: 0;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            background-size: cover;
            background-position: center;
            background-image: url('https://picsum.photos/1080/1920');
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            transition: all 0.5s ease;
        }

        .quote-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.4) 60%, rgba(0,0,0,0.1) 100%);
            z-index: 1;
        }

        .quote-content {
            position: relative;
            z-index: 3;
            padding: 24px;
        }

        .quote-text {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 1.4rem;
            color: #ffffff;
            line-height: 1.4;
            margin-bottom: 12px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.8);
        }

        .quote-author {
            color: rgba(255, 255, 255, 0.9);
            font-size: 0.95rem;
            text-align: right;
            font-weight: 600;
        }

        .quote-author::before { content: '— '; }

        .main-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .btn {
            background: var(--button-bg);
            border: 1px solid var(--card-border);
            padding: 16px 20px;
            border-radius: 16px;
            color: var(--text-primary);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn:active { transform: scale(0.95); }

        .time-tracker {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 14px;
            border: 1px solid var(--card-border);
        }

        .tracker-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 10px;
        }

        .tracker-btn {
            padding: 14px;
            border-radius: 14px;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            border: none;
            color: white;
        }

        .tracker-btn.start { background: var(--accent-red); box-shadow: 0 4px 15px var(--glow-red); }
        .tracker-btn.stop { background: var(--accent-green); box-shadow: 0 4px 15px var(--glow-green); }
        .tracker-btn:disabled { opacity: 0.3; filter: grayscale(1); }

        .lost-time-value {
            color: var(--accent-gold);
            font-size: 2.2rem;
            text-align: center;
            font-weight: 800;
            font-family: monospace;
            margin: 5px 0 15px 0;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }

        .stat-item {
            text-align: center;
            background: rgba(0, 0, 0, 0.2);
            padding: 8px;
            border-radius: 12px;
        }

        .stat-label { font-size: 0.65rem; color: var(--text-secondary); text-transform: uppercase; }
        .stat-value { font-size: 0.9rem; font-weight: 700; color: var(--text-primary); }

        .toast {
            position: fixed;
            bottom: 30px; left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #333; color: white;
            padding: 12px 24px; border-radius: 30px;
            transition: 0.4s; z-index: 1000;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }

        .loading {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 2000;
            display: none; justify-content: center; align-items: center; flex-direction: column;
            color: white;
        }
        .loading.active { display: flex; }
        
        .theme-toggle {
            position: absolute; top: 20px; right: 20px;
            z-index: 100; background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 50%; width: 44px; height: 44px;
            cursor: pointer; font-size: 1.2rem;
        }
    </style>
</head>
<body>
    <button class="theme-toggle" onclick="toggleTheme()">🌓</button>

    <div class="loading" id="loading">
        <div class="spinner"></div>
        <p>Ищем вдохновение...</p>
    </div>

    <div class="quote-card" id="quoteCard">
        <div class="quote-content">
            <div class="quote-text" id="quoteText">Время — это то, чего мы хотим больше всего и используем хуже всего.</div>
            <div class="quote-author" id="quoteAuthor">Уильям Пенн</div>
        </div>
    </div>

    <div class="main-buttons">
        <button class="btn" onclick="generateQuote()" id="generateBtn">🎲 Новая</button>
        <button class="btn" onclick="downloadImage()">💾 Скачать</button>
    </div>

    <div class="time-tracker">
        <div class="tracker-buttons">
            <button class="tracker-btn start" id="btnStart" onclick="startTimer()">👔 К ШЕФУ</button>
            <button class="tracker-btn stop" id="btnStop" onclick="stopTimer()" disabled>🕊️ СВОБОДЕН</button>
        </div>
        <div class="lost-time-value" id="currentSessionDisplay">00:00</div>
        <div class="stats-grid">
            <div class="stat-item">
                <div class="stat-label">Сегодня</div>
                <div class="stat-value" id="statToday">0м</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">Неделя</div>
                <div class="stat-value" id="statWeek">0м</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">Всего</div>
                <div class="stat-value" id="statTotal">0м</div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast">Готово!</div>

    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <script>
        // ==================== ДАННЫЕ ====================
        const fallbackQuotes = [
            { text: "Дисциплина — это решение делать то, чего очень не хочется делать, чтобы достичь того, чего очень хочется достичь.", author: "Джон Максвелл", originalLang: "ru" },
            { text: "Время не любит, когда его тратят впустую.", author: "Генри Форд", originalLang: "ru" },
            { text: "Ваше время ограничено, не тратьте его, живя чужой жизнью.", author: "Стив Джобс", originalLang: "ru" },
            { text: "Тот, кто позволяет ускользнуть часу времени, еще не понял ценности жизни.", author: "Чарльз Дарвин", originalLang: "ru" }
        ];

        const quoteAPIs = [
            {
                name: 'Forismatic (RU)',
                // Используем CORS-прокси для обхода HTTP/HTTPS блокировки
                url: `https://api.allorigins.win/get?url=${encodeURIComponent('http://api.forismatic.com/api/1.0/?method=getQuote&format=json&lang=ru&key=' + Math.floor(Math.random() * 1000000))}`,
                parse: (data) => {
                    const json = JSON.parse(data.contents);
                    return {
                        text: json.quoteText,
                        author: json.quoteAuthor.trim() || 'Неизвестный автор',
                        originalLang: 'ru'
                    };
                }
            },
            {
                name: 'Quotable',
                url: 'https://api.quotable.io/random',
                parse: (data) => ({
                    text: data.content,
                    author: data.author,
                    originalLang: 'en'
                })
            }
        ];

        // ==================== ТАЙМЕР ====================
        let timerInterval = null;
        let timerStartTime = null;
        let timeData = JSON.parse(localStorage.getItem('timeTrackerData')) || { totalSeconds: 0, sessions: [] };

        function formatDisplay(s) {
            const m = Math.floor(s / 60);
            const rs = s % 60;
            return `${String(m).padStart(2, '0')}:${String(rs).padStart(2, '0')}`;
        }

        function updateStats() {
            const now = new Date();
            const todayStr = now.toDateString();
            
            let todaySec = 0;
            timeData.sessions.forEach(s => {
                if (new Date(s.start).toDateString() === todayStr) todaySec += s.duration;
            });

            document.getElementById('statToday').textContent = Math.round(todaySec / 60) + 'м';
            document.getElementById('statTotal').textContent = Math.round(timeData.totalSeconds / 60) + 'м';
            document.getElementById('statWeek').textContent = Math.round(timeData.totalSeconds / 60) + 'м'; // Упрощено
        }

        function startTimer() {
            playTone(300, 150, 0.3); // Звук входа
            timerStartTime = Date.now();
            localStorage.setItem('activeTimer', timerStartTime);
            
            document.getElementById('btnStart').disabled = true;
            document.getElementById('btnStop').disabled = false;
            
            timerInterval = setInterval(() => {
                const elapsed = Math.floor((Date.now() - timerStartTime) / 1000);
                document.getElementById('currentSessionDisplay').textContent = formatDisplay(elapsed);
            }, 1000);
        }

        function stopTimer() {
            playTone(500, 800, 0.4); // Звук выхода
            const duration = Math.floor((Date.now() - timerStartTime) / 1000);
            
            timeData.sessions.push({ start: timerStartTime, duration: duration });
            timeData.totalSeconds += duration;
            
            localStorage.setItem('timeTrackerData', JSON.stringify(timeData));
            localStorage.removeItem('activeTimer');
            
            clearInterval(timerInterval);
            document.getElementById('btnStart').disabled = false;
            document.getElementById('btnStop').disabled = true;
            document.getElementById('currentSessionDisplay').textContent = "00:00";
            
            updateStats();
            showToast(`Потеряно ${Math.round(duration/60)} мин.`);
        }

        // ==================== ЦИТАТЫ ====================
        async function generateQuote() {
            const loader = document.getElementById('loading');
            loader.classList.add('active');
            
            try {
                // 1. Меняем фон
                const imgUrl = `https://picsum.photos/1080/1920?random=${Date.now()}`;
                document.getElementById('quoteCard').style.backgroundImage = `url(${imgUrl})`;

                // 2. Берем API
                const api = quoteAPIs[Math.floor(Math.random() * quoteAPIs.length)];
                const response = await fetch(api.url);
                const data = await response.json();
                const quote = api.parse(data);

                document.getElementById('quoteText').textContent = quote.text;
                document.getElementById('quoteAuthor').textContent = quote.author;
            } catch (e) {
                const f = fallbackQuotes[Math.floor(Math.random() * fallbackQuotes.length)];
                document.getElementById('quoteText').textContent = f.text;
                document.getElementById('quoteAuthor').textContent = f.author;
            } finally {
                loader.classList.remove('active');
            }
        }

        // ==================== СЛУЖЕБНОЕ ====================
        function playTone(freq1, freq2, duration) {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const g = ctx.createGain();
            osc.connect(g); g.connect(ctx.destination);
            osc.frequency.setValueAtTime(freq1, ctx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(freq2, ctx.currentTime + duration);
            g.gain.setValueAtTime(0.1, ctx.currentTime);
            g.gain.linearRampToValueAtTime(0, ctx.currentTime + duration);
            osc.start(); osc.stop(ctx.currentTime + duration);
        }

        function toggleTheme() {
            const t = document.documentElement.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', t);
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg; t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        function downloadImage() {
            html2canvas(document.getElementById('quoteCard')).then(canvas => {
                const link = document.createElement('a');
                link.download = 'quote.png';
                link.href = canvas.toDataURL();
                link.click();
            });
        }

        // Авто-восстановление при перезагрузке
        window.onload = () => {
            updateStats();
            const saved = localStorage.getItem('activeTimer');
            if (saved) {
                timerStartTime = parseInt(saved);
                startTimer();
            }
        };
    </script>
</body>
</html>
