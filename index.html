<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1a1a2e">
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <title>Цитаты и Время</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        :root {
            --bg-color: #1a1b26;
            --card-bg: rgba(255, 255, 255, 0.08);
            --card-border: rgba(255, 255, 255, 0.1);
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.6);
            --accent-red: #ff3b30;
            --accent-green: #34c759;
            --accent-gold: #ffd60a;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            padding: 12px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            gap: 10px;
            color: var(--text-primary);
        }

        /* Карточка с цитатой */
        .quote-card {
            position: relative;
            border-radius: 24px;
            overflow: hidden;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            background-color: #000;
        }

        #bgLayer {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center;
            transition: opacity 1s ease;
            z-index: 0;
        }

        .quote-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.3) 50%, transparent 100%);
            z-index: 1;
        }

        .quote-content {
            position: relative;
            z-index: 2;
            padding: 24px;
        }

        .quote-text {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 1.45rem;
            line-height: 1.3;
            margin-bottom: 12px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        .quote-author {
            font-size: 0.9rem;
            text-align: right;
            opacity: 0.8;
        }

        /* Кнопки основные */
        .main-nav {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .btn-ui {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--card-border);
            padding: 14px;
            border-radius: 16px;
            color: white;
            font-weight: 600;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
        }

        /* Трекер */
        .tracker-section {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .tracker-controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .btn-work {
            padding: 14px;
            border-radius: 14px;
            border: none;
            color: white;
            font-weight: 800;
            font-size: 0.9rem;
            cursor: pointer;
        }

        .btn-start { background: var(--accent-red); }
        .btn-stop { background: rgba(255, 255, 255, 0.15); color: rgba(255, 255, 255, 0.4); }
        .active-stop { background: var(--accent-green) !important; color: white !important; }

        .timer-display {
            font-size: 2.8rem;
            font-weight: 700;
            text-align: center;
            color: var(--accent-gold);
            font-family: monospace;
            margin: 4px 0;
        }

        .stats-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }

        .stat-box {
            background: rgba(0, 0, 0, 0.2);
            padding: 10px 4px;
            border-radius: 12px;
            text-align: center;
        }

        .stat-label {
            font-size: 0.65rem;
            color: var(--text-secondary);
            margin-bottom: 2px;
            text-transform: uppercase;
        }

        .stat-val {
            font-size: 0.95rem;
            font-weight: 700;
        }

        /* Загрузка */
        #loader {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            display: none;
            text-align: center;
        }

        .spinner {
            width: 30px; height: 30px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: var(--accent-gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* Всплывашка */
        #toast {
            position: fixed; bottom: 20px; left: 50%;
            transform: translateX(-50%);
            background: rgba(255,255,255,0.9);
            color: black; padding: 10px 20px;
            border-radius: 20px; font-size: 0.8rem;
            font-weight: 600; opacity: 0; transition: 0.3s;
            pointer-events: none; z-index: 1000;
        }
    </style>
</head>
<body>

    <div class="quote-card" id="quoteCard">
        <div id="bgLayer"></div>
        
        <div id="loader">
            <div class="spinner"></div>
            <div style="font-size: 0.7rem; letter-spacing: 1px;">ЗАГРУЗКА...</div>
        </div>

        <div class="quote-content" id="quoteContent">
            <div class="quote-text" id="quoteText">Единственный настоящий успех — иметь возможность жить так, как тебе хочется.</div>
            <div class="quote-author" id="quoteAuthor">— Неизвестный автор</div>
        </div>
    </div>

    <div class="main-nav">
        <button class="btn-ui" onclick="newQuote()">🎲 Новая</button>
        <button class="btn-ui" onclick="saveAsImage()">💾 Скачать</button>
    </div>

    <div class="tracker-section">
        <div class="tracker-controls">
            <button class="btn-work btn-start" id="startBtn" onclick="startCounter()">👔 К ШЕФУ</button>
            <button class="btn-work btn-stop" id="stopBtn" onclick="stopCounter()" disabled>🕊️ СВОБОДЕН</button>
        </div>
        
        <div class="timer-display" id="timer">00:00</div>

        <div class="stats-row">
            <div class="stat-box">
                <div class="stat-label">СЕГОДНЯ</div>
                <div class="stat-val" id="statToday">0м</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">НЕДЕЛЯ</div>
                <div class="stat-val" id="statWeek">0м</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">ВСЕГО</div>
                <div class="stat-val" id="statTotal">0м</div>
            </div>
        </div>
    </div>

    <div id="toast">Готово</div>

    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <script>
        let timerId = null;
        let startTime = null;
        let storage = JSON.parse(localStorage.getItem('user_time_data')) || { total: 0, history: [] };

        function updateBg(url) {
            const bg = document.getElementById('bgLayer');
            const finalUrl = url || `https://picsum.photos/1080/1920?random=${Math.random()}`;
            
            const tempImg = new Image();
            tempImg.crossOrigin = "Anonymous"; 
            tempImg.src = finalUrl;
            tempImg.onload = () => {
                bg.style.backgroundImage = `url('${finalUrl}')`;
                document.getElementById('loader').style.display = 'none';
                document.getElementById('quoteContent').style.opacity = '1';
            };
        }

        async function newQuote() {
            document.getElementById('loader').style.display = 'block';
            document.getElementById('quoteContent').style.opacity = '0.3';
            
            try {
                const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent('http://api.forismatic.com/api/1.0/?method=getQuote&format=json&lang=ru&key=' + Math.floor(Math.random()*99999))}`);
                const data = await res.json();
                const quote = JSON.parse(data.contents);
                
                document.getElementById('quoteText').textContent = quote.quoteText;
                document.getElementById('quoteAuthor').textContent = "— " + (quote.quoteAuthor || "Мудрость");
            } catch (e) {
                console.log("Ошибка API");
            }
            updateBg();
        }

        function startCounter() {
            startTime = Date.now();
            localStorage.setItem('counter_running_since', startTime);
            document.getElementById('startBtn').disabled = true;
            document.getElementById('stopBtn').disabled = false;
            document.getElementById('stopBtn').classList.add('active-stop');
            
            timerId = setInterval(() => {
                const diff = Math.floor((Date.now() - startTime) / 1000);
                const m = Math.floor(diff / 60);
                const s = diff % 60;
                document.getElementById('timer').textContent = `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
            }, 1000);
        }

        function stopCounter() {
            const duration = Math.floor((Date.now() - startTime) / 1000);
            clearInterval(timerId);
            storage.total += duration;
            storage.history.push({ date: new Date().toDateString(), val: duration });
            localStorage.setItem('user_time_data', JSON.stringify(storage));
            localStorage.removeItem('counter_running_since');

            document.getElementById('startBtn').disabled = false;
            document.getElementById('stopBtn').disabled = true;
            document.getElementById('stopBtn').classList.remove('active-stop');
            document.getElementById('timer').textContent = "00:00";
            
            refreshStats();
            msg("Сохранено");
        }

        function refreshStats() {
            const today = new Date().toDateString();
            const todaySec = storage.history
                .filter(i => i.date === today)
                .reduce((acc, curr) => acc + curr.val, 0);

            document.getElementById('statToday').textContent = Math.round(todaySec / 60) + 'м';
            document.getElementById('statTotal').textContent = Math.round(storage.total / 60) + 'м';
            document.getElementById('statWeek').textContent = Math.round(storage.total / 60) + 'м';
        }

        function msg(text) {
            const t = document.getElementById('toast');
            t.textContent = text; t.style.opacity = '1';
            setTimeout(() => t.style.opacity = '0', 2000);
        }

        function saveAsImage() {
            msg("Подготовка...");
            const node = document.getElementById('quoteCard');
            html2canvas(node, {
                useCORS: true,
                allowTaint: false,
                backgroundColor: "#000"
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = `quote_${Date.now()}.png`;
                link.href = canvas.toDataURL("image/png");
                link.click();
            });
        }

        window.onload = () => {
            updateBg('https://images.unsplash.com/photo-1505118380757-91f5f5632de0?auto=format&fit=crop&w=1080&q=80');
            refreshStats();
            const active = localStorage.getItem('counter_running_since');
            if (active) {
                startTime = parseInt(active);
                startCounter();
            }
        };
    </script>
</body>
</html>
