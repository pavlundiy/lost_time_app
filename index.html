<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1e3c72">
    <meta name="description" content="Мотивирующие цитаты с трекером потерянного времени">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Цитаты">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <title>Цитаты</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Playfair+Display:ital,wght@1,500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* ==================== КАРТОЧКА ЦИТАТЫ ==================== */
        .quote-card {
            position: relative;
            border-radius: 15px;
            padding: 0;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            flex: 1;
            min-height: 0;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            transition: all 0.5s ease;
        }

        .quote-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.9) 0%, rgba(0, 0, 0, 0.6) 50%, rgba(0, 0, 0, 0.2) 100%);
            z-index: 1;
        }

        .quote-card::after {
            content: '"';
            position: absolute;
            top: 10px;
            left: 15px;
            font-size: 6rem;
            font-family: 'Playfair Display', serif;
            color: rgba(255, 255, 255, 0.15);
            line-height: 1;
            z-index: 2;
        }

        .quote-content {
            position: relative;
            z-index: 3;
            padding: 20px;
        }

        .quote-text {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 1.3rem;
            color: #ffffff;
            line-height: 1.5;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }

        .quote-author {
            color: rgba(255, 255, 255, 0.9);
            font-size: 0.95rem;
            text-align: right;
            font-weight: 600;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
        }

        .quote-author::before {
            content: '— ';
        }

        .translation-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(255, 193, 7, 0.9);
            color: #000;
            padding: 3px 8px;
            border-radius: 10px;
            font-size: 0.65rem;
            font-weight: 700;
            z-index: 4;
            display: none;
        }

        .translation-badge.visible {
            display: block;
        }

        /* ==================== КНОПКИ ==================== */
        .main-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .btn {
            background: rgba(255, 255, 255, 0.25);
            border: none;
            padding: 14px 15px;
            border-radius: 12px;
            color: #ffffff;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.4);
            transform: translateY(-2px);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* ==================== ТРЕКЕР ВРЕМЕНИ ==================== */
        .time-tracker {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            border-radius: 15px;
            padding: 12px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .tracker-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 8px;
        }

        .tracker-btn {
            padding: 12px 15px;
            border-radius: 12px;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .tracker-btn.start {
            background: linear-gradient(135deg, #dc3545 0%, #c82333 100%);
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        .tracker-btn.start:hover {
            background: linear-gradient(135deg, #e74c5c 0%, #d32f3f 100%);
            transform: translateY(-2px);
        }

        .tracker-btn.stop {
            background: linear-gradient(135deg, #28a745 0%, #218838 100%);
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        .tracker-btn.stop:hover {
            background: linear-gradient(135deg, #34ce57 0%, #2e9b40 100%);
            transform: translateY(-2px);
        }

        .tracker-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        .tracker-btn.active {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3); }
            50% { box-shadow: 0 4px 25px rgba(220, 53, 69, 0.6); }
        }

        .lost-time-display {
            text-align: center;
            margin-bottom: 8px;
        }

        .lost-time-value {
            color: #ffc107;
            font-size: 1.8rem;
            font-weight: 700;
            font-family: 'Montserrat', sans-serif;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
        }

        .stat-item {
            text-align: center;
            background: rgba(0, 0, 0, 0.2);
            padding: 6px;
            border-radius: 8px;
        }

        .stat-label {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.65rem;
            margin-bottom: 2px;
        }

        .stat-value {
            color: #ffffff;
            font-size: 0.85rem;
            font-weight: 600;
        }

        /* ==================== УВЕДОМЛЕНИЯ ==================== */
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(40, 167, 69, 0.95);
            color: white;
            padding: 12px 25px;
            border-radius: 25px;
            font-weight: 600;
            font-size: 0.9rem;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            opacity: 0;
            transition: all 0.4s ease;
            z-index: 1000;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .toast.error {
            background: rgba(220, 53, 69, 0.95);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .quote-card.animate {
            animation: fadeIn 0.5s ease;
        }

        .loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 9999;
            backdrop-filter: blur(5px);
        }

        .loading.active {
            display: flex;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid #fff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 15px;
        }

        .loading-text {
            color: white;
            font-size: 1rem;
            font-weight: 600;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* PWA Install Banner */
        .install-banner {
            position: fixed;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(30, 60, 114, 0.95);
            color: white;
            padding: 10px 20px;
            border-radius: 12px;
            display: none;
            align-items: center;
            gap: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            z-index: 999;
            transition: all 0.4s ease;
            font-size: 0.85rem;
        }

        .install-banner.show {
            display: flex;
            transform: translateX(-50%) translateY(0);
        }

        .install-banner button {
            background: #28a745;
            border: none;
            padding: 6px 15px;
            border-radius: 8px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.8rem;
        }

        .install-banner button.close {
            background: transparent;
            border: 2px solid rgba(255,255,255,0.5);
        }
    </style>
</head>
<body>
    <!-- PWA Install Banner -->
    <div class="install-banner" id="installBanner">
        <span>📲 Установить</span>
        <button onclick="installApp()">OK</button>
        <button class="close" onclick="closeInstallBanner()">✕</button>
    </div>

    <div class="loading" id="loading">
        <div class="spinner"></div>
        <div class="loading-text" id="loadingText">Загрузка...</div>
    </div>

    <!-- ==================== КАРТОЧКА ЦИТАТЫ ==================== -->
    <div class="quote-card" id="quoteCard">
        <div class="translation-badge" id="transBadge">ПЕРЕВЕДЕНО</div>
        <div class="quote-content">
            <div class="quote-text" id="quoteText">
                Нажмите «Новая цитата», чтобы начать!
            </div>
            <div class="quote-author" id="quoteAuthor">
                Автор
            </div>
        </div>
    </div>

    <!-- ==================== КНОПКИ ==================== -->
    <div class="main-buttons">
        <button class="btn" onclick="generateQuote()" id="generateBtn">
            🎲 Новая
        </button>
        <button class="btn" onclick="downloadImage()" id="downloadBtn">
            💾 Скачать
        </button>
    </div>

    <!-- ==================== ТРЕКЕР ВРЕМЕНИ ==================== -->
    <div class="time-tracker">
        <div class="tracker-buttons">
            <button class="tracker-btn start" id="btnStart" onclick="startTimer()">
                👔 К шефу
            </button>
            <button class="tracker-btn stop" id="btnStop" onclick="stopTimer()" disabled>
                🕊️ Свободен
            </button>
        </div>

        <div class="lost-time-display">
            <div class="lost-time-value" id="totalLostTime">00:00:00</div>
        </div>

        <div class="stats-grid">
            <div class="stat-item">
                <div class="stat-label">Сегодня</div>
                <div class="stat-value" id="statToday">0 мин</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">Неделя</div>
                <div class="stat-value" id="statWeek">0 мин</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">Всего</div>
                <div class="stat-value" id="statTotal">0 мин</div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast">Скопировано!</div>

    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <script>
        // ==================== PWA INSTALL ====================
        let deferredPrompt;
        
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('installBanner').classList.add('show');
        });

        async function installApp() {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                deferredPrompt = null;
                closeInstallBanner();
            }
        }

        function closeInstallBanner() {
            document.getElementById('installBanner').classList.remove('show');
        }

        // Регистрация Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./service-worker.js')
                    .then(reg => console.log('SW registered:', reg))
                    .catch(err => console.log('SW error:', err));
            });
        }

        // ==================== РЕЗЕРВНЫЕ ЦИТАТЫ ====================
        const fallbackQuotes = [
            { text: "Единственный способ сделать выдающуюся работу — любить то, что ты делаешь.", author: "Стив Джобс", originalLang: 'ru' },
            { text: "Верь, что ты можешь, и ты уже на полпути.", author: "Теодор Рузвельт", originalLang: 'ru' },
            { text: "Не жди. Время никогда не будет идеальным.", author: "Наполеон Хилл", originalLang: 'ru' },
            { text: "Успех — это способность идти от неудачи к неудаче, не теряя энтузиазма.", author: "Уинстон Черчилль", originalLang: 'ru' },
            { text: "Лучшее время, чтобы посадить дерево, было 20 лет назад. Следующее лучшее время — сегодня.", author: "Китайская пословица", originalLang: 'ru' },
            { text: "Ваше время ограничено, не тратьте его, живя чужой жизнью.", author: "Стив Джобс", originalLang: 'ru' },
            { text: "Победа — это ещё не всё, но желание победить — это всё.", author: "Винс Ломбарди", originalLang: 'ru' },
            { text: "Неудача — это просто возможность начать снова, но уже более мудро.", author: "Генри Форд", originalLang: 'ru' },
            { text: "Либо вы управляете вашим днём, либо день управляет вами.", author: "Джим Рон", originalLang: 'ru' },
            { text: "Мечтайте по-крупному и не бойтесь мечтать.", author: "Марк Хансон", originalLang: 'ru' },
            { text: "Сложнее всего начать действовать, все остальное зависит только от упорства.", author: "Амелия Эрхарт", originalLang: 'ru' },
            { text: "Жизнь — это 10% того, что с вами происходит, и 90% того, как вы на это реагируете.", author: "Чарльз Свиндолл", originalLang: 'ru' },
            { text: "Не позволяйте вчерашнему дню занимать слишком много места сегодня.", author: "Уилл Роджерс", originalLang: 'ru' },
            { text: "Вы никогда не пересечете океан, если не наберетесь смелости потерять берег из виду.", author: "Христофор Колумб", originalLang: 'ru' },
            { text: "Стремитесь не к успеху, а к ценностям, которые он дает.", author: "Альберт Эйнштейн", originalLang: 'ru' }
        ];

        // ==================== СПИСОК API ДЛЯ ЦИТАТ ====================
        const quoteAPIs = [
            {
                name: 'ZenQuotes',
                url: 'https://zenquotes.io/api/random',
                parse: (data) => ({
                    text: data[0].q,
                    author: data[0].a,
                    originalLang: 'en'
                })
            },
            {
                name: 'Quotable',
                url: 'https://api.quotable.io/random',
                parse: (data) => ({
                    text: data.content,
                    author: data.author,
                    originalLang: 'en'
                })
            },
            {
                name: 'Stoic Quotes',
                url: 'https://stoic.tekloon.net/stoic-quote',
                parse: (data) => ({
                    text: data.quote,
                    author: data.author || 'Стоический философ',
                    originalLang: 'en'
                })
            }
        ];

        // ==================== ПЕРЕМЕННЫЕ ====================
        let currentQuote = null;
        let currentBg = '';
        let isOnline = navigator.onLine;
        let timerInterval = null;
        let timerStartTime = null;
        let isTimerRunning = false;
        let timeData = JSON.parse(localStorage.getItem('timeTrackerData')) || {
            totalSeconds: 0,
            sessions: []
        };

        // ==================== ПРОВЕРКА СТАТУСА ПОДКЛЮЧЕНИЯ ====================
        window.addEventListener('online', updateOnlineStatus);
        window.addEventListener('offline', updateOnlineStatus);

        function updateOnlineStatus() {
            isOnline = navigator.onLine;
        }

        // ==================== ИНИЦИАЛИЗАЦИЯ ====================
        document.addEventListener('DOMContentLoaded', () => {
            updateOnlineStatus();
            loadRandomBackground();
            updateTimeDisplay();
            updateStats();
            
            const savedTimer = localStorage.getItem('activeTimer');
            if (savedTimer) {
                const startTime = parseInt(savedTimer);
                if (!isNaN(startTime)) {
                    timerStartTime = startTime;
                    isTimerRunning = true;
                    startTimerDisplay();
                }
            }
        });

        // ==================== ЗАГРУЗКА СЛУЧАЙНОГО ФОНА ====================
        function loadRandomBackground() {
            const picsumUrl = `https://picsum.photos/1920/1080?random=${Date.now()}`;
            
            return new Promise((resolve) => {
                const img = new Image();
                img.onload = () => {
                    currentBg = picsumUrl;
                    const quoteCard = document.getElementById('quoteCard');
                    quoteCard.style.backgroundImage = `url('${picsumUrl}')`;
                    resolve();
                };
                img.onerror = () => {
                    const quoteCard = document.getElementById('quoteCard');
                    quoteCard.style.background = 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)';
                    resolve();
                };
                img.src = picsumUrl;
            });
        }

        // ==================== ЗАГРУЗКА ЦИТАТЫ С ПЕРЕБОРОМ API ====================
        async function fetchQuoteFromAPI() {
            const loadingText = document.getElementById('loadingText');
            
            for (const api of quoteAPIs) {
                try {
                    loadingText.textContent = `Загрузка...`;
                    
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), 5000);
                    
                    const response = await fetch(api.url, { 
                        signal: controller.signal,
                        headers: { 'Accept': 'application/json' }
                    });
                    
                    clearTimeout(timeoutId);
                    
                    if (!response.ok) throw new Error(`${api.name} returned ${response.status}`);
                    
                    const data = await response.json();
                    const quote = api.parse(data);
                    
                    return quote;
                    
                } catch (error) {
                    console.warn(`${api.name} не сработал:`, error.message);
                }
            }
            
            return fallbackQuotes[Math.floor(Math.random() * fallbackQuotes.length)];
        }

        // ==================== ПЕРЕВОД ТЕКСТА ====================
        async function translateText(text, from = 'en', to = 'ru') {
            if (from === to) return text;
            
            try {
                const encodedText = encodeURIComponent(text);
                const url = `https://api.mymemory.translated.net/get?q=${encodedText}&langpair=${from}|${to}`;
                
                const response = await fetch(url);
                const data = await response.json();
                
                if (data.responseStatus === 200 && data.responseData.translatedText) {
                    return data.responseData.translatedText;
                } else {
                    throw new Error('Translation failed');
                }
            } catch (error) {
                return text;
            }
        }

        // ==================== ГЕНЕРАЦИЯ ЦИТАТЫ ====================
        async function generateQuote() {
            const loading = document.getElementById('loading');
            const generateBtn = document.getElementById('generateBtn');
            
            loading.classList.add('active');
            generateBtn.disabled = true;
            
            try {
                let quoteData = await fetchQuoteFromAPI();
                
                await loadRandomBackground();
                
                const loadingText = document.getElementById('loadingText');
                loadingText.textContent = 'Перевод...';
                
                try {
                    const translated = await translateText(quoteData.text, 'en', 'ru');
                    quoteData.translatedText = translated;
                } catch (transError) {
                    quoteData.translatedText = null;
                }
                
                currentQuote = quoteData;
                displayQuote(quoteData);
                
                if (!isOnline) showToast('Офлайн режим', 'error');
                
            } catch (error) {
                const quoteData = fallbackQuotes[Math.floor(Math.random() * fallbackQuotes.length)];
                currentQuote = quoteData;
                displayQuote(quoteData);
                
            } finally {
                loading.classList.remove('active');
                generateBtn.disabled = false;
            }
        }

        // ==================== ОТОБРАЖЕНИЕ ЦИТАТЫ ====================
        function displayQuote(quote) {
            const quoteText = document.getElementById('quoteText');
            const quoteAuthor = document.getElementById('quoteAuthor');
            const transBadge = document.getElementById('transBadge');
            const quoteCard = document.getElementById('quoteCard');
            
            quoteCard.classList.remove('animate');
            void quoteCard.offsetWidth;
            quoteCard.classList.add('animate');
            
            let displayText = quote.text;
            let isTranslated = false;
            
            if (quote.originalLang === 'en' && quote.translatedText) {
                displayText = quote.translatedText;
                isTranslated = true;
            }
            
            quoteText.textContent = displayText;
            quoteAuthor.textContent = quote.author;
            
            transBadge.classList.toggle('visible', isTranslated);
        }

        // ==================== СКАЧИВАНИЕ КАРТИНКИ ====================
        function downloadImage() {
            if (!currentQuote) {
                showToast("Сначала получите цитату!", 'error');
                return;
            }
            
            const quoteCard = document.getElementById('quoteCard');
            
            html2canvas(quoteCard, {
                backgroundColor: null,
                scale: 2,
                useCORS: true,
                allowTaint: true,
                logging: false
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = `цитата-${Date.now()}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
                showToast("Скачано!");
            }).catch(() => {
                showToast("Ошибка!", 'error');
            });
        }

        // ==================== УВЕДОМЛЕНИЯ ====================
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast show';
            if (type === 'error') {
                toast.classList.add('error');
            }
            setTimeout(() => {
                toast.classList.remove('show');
                toast.classList.remove('error');
            }, 2000);
        }

        // ==================== ТРЕКЕР ВРЕМЕНИ ====================
        
        function formatTime(seconds) {
            const hrs = Math.floor(seconds / 3600);
            const mins = Math.floor((seconds % 3600) / 60);
            const secs = seconds % 60;
            return `${String(hrs).padStart(2, '0')}:${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
        }

        function formatTimeShort(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
        }

        function updateTimeDisplay() {
            const totalDisplay = document.getElementById('totalLostTime');
            totalDisplay.textContent = formatTime(timeData.totalSeconds);
        }

        function updateStats() {
            const now = new Date();
            const todayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
            const weekStart = new Date(now.setDate(now.getDate() - now.getDay())).getTime();

            let todaySeconds = 0;
            let weekSeconds = 0;

            timeData.sessions.forEach(session => {
                if (session.end) {
                    if (session.start >= todayStart) {
                        todaySeconds += session.duration;
                    }
                    if (session.start >= weekStart) {
                        weekSeconds += session.duration;
                    }
                }
            });

            document.getElementById('statToday').textContent = formatTimeShort(todaySeconds);
            document.getElementById('statWeek').textContent = formatTimeShort(weekSeconds);
            document.getElementById('statTotal').textContent = formatTimeShort(timeData.totalSeconds);
        }

        function startTimer() {
            if (isTimerRunning) return;
            
            timerStartTime = Date.now();
            isTimerRunning = true;
            
            localStorage.setItem('activeTimer', timerStartTime.toString());
            
            document.getElementById('btnStart').disabled = true;
            document.getElementById('btnStop').disabled = false;
            document.getElementById('btnStart').classList.add('active');
            
            startTimerDisplay();
            
            showToast('Таймер запущен!');
        }

        function startTimerDisplay() {
            timerInterval = setInterval(() => {
                const elapsed = Math.floor((Date.now() - timerStartTime) / 1000);
                document.getElementById('totalLostTime').textContent = formatTimeShort(elapsed);
            }, 1000);
        }

        function stopTimer() {
            if (!isTimerRunning) return;
            
            const endTime = Date.now();
            const duration = Math.floor((endTime - timerStartTime) / 1000);
            
            const session = {
                start: timerStartTime,
                end: endTime,
                duration: duration,
                date: new Date().toISOString()
            };
            
            timeData.sessions.push(session);
            timeData.totalSeconds += duration;
            
            localStorage.setItem('timeTrackerData', JSON.stringify(timeData));
            localStorage.removeItem('activeTimer');
            
            clearInterval(timerInterval);
            isTimerRunning = false;
            timerStartTime = null;
            
            document.getElementById('btnStart').disabled = false;
            document.getElementById('btnStop').disabled = true;
            document.getElementById('btnStart').classList.remove('active');
            
            updateTimeDisplay();
            updateStats();
            
            showToast(`Записано ${formatTimeShort(duration)}`);
        }

        window.addEventListener('beforeunload', () => {
            if (isTimerRunning && timerStartTime) {
                localStorage.setItem('activeTimer', timerStartTime.toString());
            }
        });
    </script>
</body>
</html>
