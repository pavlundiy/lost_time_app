<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0f1016">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Цитаты">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <title>Цитаты и Время</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        :root {
            --bg-color: #0f1016;
            --card-bg: rgba(255, 255, 255, 0.08);
            --card-border: rgba(255, 255, 255, 0.12);
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.6);
            --accent-red: #ff3b30;
            --accent-green: #34c759;
            --accent-gold: #ffd60a;
            --accent-blue: #007aff;
        }

        html, body {
            height: 100%;
            min-height: 100dvh;
            overflow: hidden;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            padding: 12px 12px 16px 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            color: var(--text-primary);
        }

        .quote-card {
            position: relative;
            border-radius: 30px;
            overflow: hidden;
            flex: 1;
            min-height: 0;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            background-color: #000;
            border: 1px solid var(--card-border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        #bgLayer {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center;
            z-index: 0;
            transition: opacity 1.2s ease-in-out, transform 2.5s ease-out;
            opacity: 0;
            transform: scale(1.15);
        }

        #bgLayer.loaded { opacity: 1; transform: scale(1); }

        .quote-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.4) 50%, transparent 100%);
            z-index: 1;
        }

        .quote-content {
            position: relative;
            z-index: 2;
            padding: 28px 20px;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.8s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .quote-content.visible { opacity: 1; transform: translateY(0); }

        .quote-text {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 1.5rem;
            line-height: 1.35;
            margin-bottom: 10px;
            color: #fff;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        .quote-author {
            font-size: 0.9rem;
            text-align: right;
            font-weight: 600;
            color: var(--text-secondary);
            letter-spacing: 0.5px;
        }

        #loaderOverlay {
            position: absolute;
            inset: 0;
            background: #000;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 15px;
            transition: opacity 0.5s ease;
        }

        .loader-msg {
            color: var(--accent-gold);
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }

        .btn-ui {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            padding: 13px;
            border-radius: 18px;
            color: var(--text-primary);
            font-weight: 600;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            backdrop-filter: blur(10px);
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            font-size: 0.95rem;
        }
        .btn-ui:active { transform: scale(0.92); }

        .tracker-section {
            background: var(--card-bg);
            border-radius: 28px;
            padding: 16px;
            border: 1px solid var(--card-border);
            display: flex; flex-direction: column; gap: 14px;
        }

        .tracker-controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

        .btn-work {
            padding: 16px; border-radius: 20px; border: none;
            color: white; font-weight: 800; cursor: pointer;
            font-size: 0.85rem;
            box-shadow: 0 4px 0 rgba(0,0,0,0.2);
            position: relative;
            transition: transform 0.1s;
        }

        .btn-start { background: var(--accent-red); }
        .btn-start:active { transform: translateY(2px); box-shadow: 0 2px 0 rgba(0,0,0,0.2); }
        .btn-start:disabled { opacity: 0.3; cursor: default; transform: none; box-shadow: none; }
        
        .btn-stop { background: rgba(255,255,255,0.1); color: var(--text-secondary); }
        .btn-stop.active-stop { background: var(--accent-green) !important; color: white !important; }
        .btn-stop.active-stop:active { transform: translateY(2px); box-shadow: 0 2px 0 rgba(0,0,0,0.2); }

        .timer-display {
            font-size: 2.8rem; font-weight: 800; text-align: center;
            color: var(--accent-gold); font-family: monospace;
            letter-spacing: -1px;
        }

        .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .stat-box { 
            background: rgba(0,0,0,0.3); 
            padding: 10px 4px; 
            border-radius: 18px; 
            text-align: center; 
            border: 1px solid rgba(255,255,255,0.05);
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 70px;
        }
        .stat-label { font-size: 0.5rem; opacity: 0.5; margin-bottom: 4px; font-weight: 800; text-transform: uppercase; }
        .stat-val { font-weight: 800; font-size: 0.85rem; color: #fff; }
        
        .stat-progress-wrap {
            width: 80%; height: 3px; background: rgba(255,255,255,0.1);
            border-radius: 2px; margin: 6px auto 0 auto; overflow: hidden;
        }
        .stat-progress-bar { height: 100%; width: 0%; transition: width 1.5s cubic-bezier(0.23, 1, 0.32, 1); }

        #toast {
            position: fixed; bottom: 20%; left: 50%; transform: translateX(-50%) translateY(100px);
            background: #fff; color: #000; padding: 12px 24px;
            border-radius: 30px; font-weight: 700; opacity: 0; transition: 0.3s;
            z-index: 1000; pointer-events: none; box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        #installPwaBtn {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--accent-green);
            color: #fff;
            border: none;
            padding: 14px 28px;
            border-radius: 24px;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            display: none;
            align-items: center;
            gap: 8px;
            box-shadow: 0 8px 25px rgba(52, 199, 89, 0.4);
            z-index: 999;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: slideUp 0.4s ease forwards;
        }

        #installPwaBtn.show {
            display: flex;
            transform: translateX(-50%) translateY(0);
        }

        #installPwaBtn:active {
            transform: translateX(-50%) scale(0.98);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateX(-50%) translateY(100px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        @media (max-height: 700px) {
            .quote-text { font-size: 1.3rem; }
            .timer-display { font-size: 2.4rem; }
            .stat-box { min-height: 65px; }
            .quote-content { padding: 24px 18px; }
        }
    </style>
</head>
<body>
    <button id="installPwaBtn" onclick="installPWA()">📲 Установить приложение</button>

    <div class="quote-card" id="quoteCard">
        <div id="bgLayer"></div>
        <div id="loaderOverlay">
            <div class="loader-msg" id="loaderMsg">Настраиваем фокус...</div>
        </div>
        <div class="quote-content" id="qContent">
            <div class="quote-text" id="qText">...</div>
            <div class="quote-author" id="qAuthor"></div>
        </div>
    </div>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
        <button class="btn-ui" onclick="newQuote()">🎲 Цитата</button>
        <button class="btn-ui" onclick="saveAsImage()">💾 Скрин</button>
    </div>

    <div class="tracker-section">
        <div class="tracker-controls">
            <button class="btn-work btn-start" id="startBtn" onclick="startCounter()">👔 К ШЕФУ</button>
            <button class="btn-work btn-stop" id="stopBtn" onclick="stopCounter()" disabled>🕊️ СВОБОДЕН</button>
        </div>
        <div class="timer-display" id="timer">00:00:00</div>
        <div class="stats-row">
            <div class="stat-box">
                <div class="stat-label">Сегодня</div>
                <div class="stat-val" id="sDay">00:00:00</div>
                <div class="stat-progress-wrap"><div class="stat-progress-bar" id="pDay" style="background:var(--accent-gold)"></div></div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Неделя</div>
                <div class="stat-val" id="sWeek">00:00</div>
                <div class="stat-progress-wrap"><div class="stat-progress-bar" id="pWeek" style="background:var(--accent-green)"></div></div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Всего</div>
                <div class="stat-val" id="sTotal">0 дн.</div>
                <div class="stat-progress-wrap"><div class="stat-progress-bar" id="pTotal" style="background:var(--accent-blue); width:100%"></div></div>
            </div>
        </div>
    </div>

    <div id="toast"></div>

    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <script>
        // ==================== PWA INSTALL ====================
        let deferredPrompt = null;
        const installBtn = document.getElementById('installPwaBtn');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installBtn.classList.add('show');
        });

        window.addEventListener('appinstalled', () => {
            installBtn.classList.remove('show');
            deferredPrompt = null;
            msg('Приложение установлено! 🎉');
        });

        async function installPWA() {
            if (!deferredPrompt) { msg('Установка недоступна'); return; }
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            if (outcome === 'accepted') {
                installBtn.classList.remove('show');
                msg('Установка запущена!');
            }
            deferredPrompt = null;
        }

        // ==================== ЗВУКОВЫЕ ЭФФЕКТЫ ====================
        let audioContext = null;

        function initAudio() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioContext.state === 'suspended') {
                audioContext.resume();
            }
        }

        function playBossSound() {
            initAudio();
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            oscillator.frequency.setValueAtTime(300, audioContext.currentTime);
            oscillator.frequency.exponentialRampToValueAtTime(150, audioContext.currentTime + 0.3);
            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.3);
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.3);
        }

        function playFreeSound() {
            initAudio();
            const notes = [523.25, 659.25, 783.99];
            notes.forEach((freq, index) => {
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();
                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);
                oscillator.frequency.value = freq;
                oscillator.type = 'sine';
                const startTime = audioContext.currentTime + (index * 0.05);
                gainNode.gain.setValueAtTime(0, startTime);
                gainNode.gain.linearRampToValueAtTime(0.2, startTime + 0.05);
                gainNode.gain.exponentialRampToValueAtTime(0.01, startTime + 0.4);
                oscillator.start(startTime);
                oscillator.stop(startTime + 0.4);
            });
        }

        // ==================== ОСНОВНОЙ КОД ====================
        let startTime = null, timerId = null;
        const storage = JSON.parse(localStorage.getItem('time_data')) || { total: 0, history: [] };
        const WORK_DAY_SEC = 9 * 3600;

        const loadingPhrases = [
            "Ищем вдохновение...",
            "Загружаем мудрость...",
            "Выбираем фон...",
            "Настраиваем фокус...",
            "Слушаем пульс...",
            "Почти готово...",
            "Ещё немного...",
            "Цитата уже близко..."
        ];

        function formatFullTime(seconds) {
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = seconds % 60;
            return [h, m, s].map(v => v.toString().padStart(2, '0')).join(':');
        }

        function formatHHMM(seconds) {
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            return `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}`;
        }

        function msg(t) {
            const el = document.getElementById('toast');
            el.textContent = t; 
            el.style.opacity = 1;
            el.classList.add('show');
            setTimeout(() => {
                el.style.opacity = 0;
                el.classList.remove('show');
            }, 2000);
        }

        function updateStats() {
            const todayStr = new Date().toDateString();
            const daySec = storage.history.filter(i => i.d === todayStr).reduce((a, b) => a + b.v, 0);
            document.getElementById('sDay').textContent = formatFullTime(daySec);
            document.getElementById('pDay').style.width = Math.min(100, (daySec / WORK_DAY_SEC) * 100) + '%';
            
            const weekAgo = Date.now() - (7 * 24 * 3600 * 1000);
            const weekTotal = storage.history.filter(i => (i.ts || 0) > weekAgo).reduce((a, b) => a + b.v, 0);
            document.getElementById('sWeek').textContent = formatHHMM(weekTotal);
            document.getElementById('pWeek').style.width = Math.min(100, (weekTotal / (WORK_DAY_SEC * 5)) * 100) + '%';
            
            const uniqueDays = new Set(storage.history.map(i => i.d)).size;
            document.getElementById('sTotal').textContent = uniqueDays + ' дн.';
        }

        async function newQuote() {
            const overlay = document.getElementById('loaderOverlay');
            const bg = document.getElementById('bgLayer');
            const content = document.getElementById('qContent');
            const loaderMsg = document.getElementById('loaderMsg');

            overlay.style.opacity = '1';
            content.classList.remove('visible');
            bg.classList.remove('loaded');
            loaderMsg.textContent = "🌍 Загружаем Bing обои...";

            try {
                const bingRes = await fetch('https://www.bing.com/HPImageArchive.aspx?format=js&idx=0&days=1');
                const bingData = await bingRes.json();
                const bingImage = bingData.images[0];
                
                const imgUrl = 'https://www.bing.com' + bingImage.urlbase + '&pid=hp&w=1080&h=1920&rs=1&c=4';
                
                const img = new Image();
                img.crossOrigin = "anonymous";
                img.src = imgUrl;
                
                img.onload = () => {
                    bg.style.backgroundImage = `url('${imgUrl}')`;
                    bg.classList.add('loaded');
                    loaderMsg.textContent = "✨ Готово!";
                    setTimeout(() => {
                        overlay.style.opacity = '0';
                        content.classList.add('visible');
                    }, 400);
                };
                
                img.onerror = () => {
                    const fallbackUrl = `https://picsum.photos/1080/1920?random=${Math.random()}`;
                    bg.style.backgroundImage = `url('${fallbackUrl}')`;
                    bg.classList.add('loaded');
                    setTimeout(() => {
                        overlay.style.opacity = '0';
                        content.classList.add('visible');
                    }, 400);
                };
            } catch(e) {
                const fallbackUrl = `https://picsum.photos/1080/1920?random=${Math.random()}`;
                bg.style.backgroundImage = `url('${fallbackUrl}')`;
                bg.classList.add('loaded');
                overlay.style.opacity = '0';
                content.classList.add('visible');
            }

            try {
                loaderMsg.textContent = "📝 Ищем цитату...";
                
                const controller = new AbortController();
                const timeoutId = setTimeout(() => {
                    controller.abort();
                    console.warn('⏱️ Таймаут 10 сек: цитата не загрузилась');
                }, 10000);
                
                const res = await fetch(
                    'https://api.allorigins.win/get?url=' + encodeURIComponent('http://api.forismatic.com/api/1.0/?method=getQuote&format=json&lang=ru'),
                    { signal: controller.signal }
                );
                
                clearTimeout(timeoutId);
                const d = await res.json();
                const q = JSON.parse(d.contents);
                document.getElementById('qText').textContent = q.quoteText;
                document.getElementById('qAuthor').textContent = "— " + (q.quoteAuthor || "Автор неизвестен");
                
            } catch(e) {
                console.warn('Forismatic не загрузился, используем fallback');
                document.getElementById('qText').textContent = "Ваше время ограничено, не тратьте его, живя чужой жизнью.";
                document.getElementById('qAuthor').textContent = "— Стив Джобс";
            }
            
            overlay.style.opacity = '0';
            content.classList.add('visible');
        }

        function startCounter() {
            if (timerId) return;
            
            playBossSound();
            
            startTime = Date.now();
            localStorage.setItem('active_start', startTime);
            
            document.getElementById('startBtn').disabled = true;
            const stopBtn = document.getElementById('stopBtn');
            stopBtn.disabled = false;
            stopBtn.classList.add('active-stop');

            timerId = setInterval(() => {
                const s = Math.floor((Date.now() - startTime) / 1000);
                document.getElementById('timer').textContent = formatFullTime(s);
            }, 1000);
        }

        function stopCounter() {
            if (!startTime) return;
            
            playFreeSound();
            
            const diff = Math.floor((Date.now() - startTime) / 1000);
            clearInterval(timerId);
            timerId = null;
            
            storage.total += diff;
            storage.history.push({ d: new Date().toDateString(), v: diff, ts: Date.now() });
            localStorage.setItem('time_data', JSON.stringify(storage));
            localStorage.removeItem('active_start');
            
            document.getElementById('startBtn').disabled = false;
            document.getElementById('stopBtn').disabled = true;
            document.getElementById('stopBtn').classList.remove('active-stop');
            document.getElementById('timer').textContent = '00:00:00';
            
            updateStats();
            startTime = null;
            
            msg(`✅ Записано ${formatFullTime(diff)}`);
            
            // === ОБНОВЛЯЕМ ЦИТАТУ ===
            newQuote();
        }

        function saveAsImage() {
            msg("📸 Создаем фото...");
            const card = document.getElementById('quoteCard');
            html2canvas(card, { useCORS: true, scale: 2 }).then(canvas => {
                const link = document.createElement('a');
                link.download = `focus_${Date.now()}.png`;
                link.href = canvas.toDataURL();
                link.click();
                msg("✅ Готово!");
            }).catch(err => msg("❌ Ошибка сохранения"));
        }

        window.onload = () => {
            newQuote();
            updateStats();

            const active = localStorage.getItem('active_start');
            if(active) {
                startTime = parseInt(active);
                document.getElementById('startBtn').disabled = true;
                const stopBtn = document.getElementById('stopBtn');
                stopBtn.disabled = false;
                stopBtn.classList.add('active-stop');
                timerId = setInterval(() => {
                    const s = Math.floor((Date.now() - startTime) / 1000);
                    document.getElementById('timer').textContent = formatFullTime(s);
                }, 1000);
            }

            if ('serviceWorker' in navigator) {
                const isLocalhost = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
                const isHttps = window.location.protocol === 'https:';
                if (isHttps || isLocalhost) {
                    navigator.serviceWorker.register('service-worker.js')
                        .then(reg => console.log('✅ SW зарегистрирован:', reg.scope))
                        .catch(err => console.warn('⚠️ Ошибка SW:', err));
                }
            }
        };
    </script>
</body>
</html>
