<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0f1016">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Цитаты">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <title>Цитаты и Время</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        :root {
            --bg-color: #0f1016;
            --card-bg: rgba(255, 255, 255, 0.08);
            --card-border: rgba(255, 255, 255, 0.12);
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.6);
            --accent-red: #ff3b30;
            --accent-green: #34c759;
            --accent-gold: #ffd60a;
            --accent-blue: #007aff;
            --accent-purple: #bf5af2;
        }

        html, body {
            height: 100%;
            min-height: 100dvh;
            overflow: hidden;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            padding: 12px 12px 16px 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            color: var(--text-primary);
        }

        .quote-card {
            position: relative;
            border-radius: 30px;
            overflow: hidden;
            flex: 1;
            min-height: 0;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            background-color: #000;
            border: 1px solid var(--card-border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        #bgLayer {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center;
            z-index: 0;
            transition: opacity 1.2s ease-in-out, transform 2.5s ease-out;
            opacity: 0;
            transform: scale(1.15);
        }

        #bgLayer.loaded { opacity: 1; transform: scale(1); }

        .quote-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.4) 50%, transparent 100%);
            z-index: 1;
        }

        .quote-content {
            position: relative;
            z-index: 2;
            padding: 28px 20px;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.8s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .quote-content.visible { opacity: 1; transform: translateY(0); }

        .quote-text {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 1.5rem;
            line-height: 1.35;
            margin-bottom: 10px;
            color: #fff;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        .quote-author {
            font-size: 0.9rem;
            text-align: right;
            font-weight: 600;
            color: var(--text-secondary);
            letter-spacing: 0.5px;
        }

        #loaderOverlay {
            position: absolute;
            inset: 0;
            background: #000;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 15px;
            transition: opacity 0.5s ease;
        }

        .loader-msg {
            color: var(--accent-gold);
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }

        .btn-ui {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            padding: 13px;
            border-radius: 18px;
            color: var(--text-primary);
            font-weight: 600;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            backdrop-filter: blur(10px);
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            font-size: 0.95rem;
        }
        .btn-ui:active { transform: scale(0.92); }

        .tracker-section {
            background: var(--card-bg);
            border-radius: 28px;
            padding: 16px;
            border: 1px solid var(--card-border);
            display: flex; flex-direction: column; gap: 14px;
        }

        .tracker-controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

        .btn-work {
            padding: 16px; border-radius: 20px; border: none;
            color: white; font-weight: 800; cursor: pointer;
            font-size: 0.85rem;
            box-shadow: 0 4px 0 rgba(0,0,0,0.2);
            position: relative;
            transition: transform 0.1s;
        }

        .btn-start { background: var(--accent-red); }
        .btn-start:active { transform: translateY(2px); box-shadow: 0 2px 0 rgba(0,0,0,0.2); }
        .btn-start:disabled { opacity: 0.3; cursor: default; transform: none; box-shadow: none; }
        
        .btn-stop { background: rgba(255,255,255,0.1); color: var(--text-secondary); }
        .btn-stop.active-stop { background: var(--accent-green) !important; color: white !important; }
        .btn-stop.active-stop:active { transform: translateY(2px); box-shadow: 0 2px 0 rgba(0,0,0,0.2); }

        .timer-display {
            font-size: 2.8rem; font-weight: 800; text-align: center;
            color: var(--accent-gold); font-family: monospace;
            letter-spacing: -1px;
        }

        .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .stat-box { 
            background: rgba(0,0,0,0.3); 
            padding: 10px 4px; 
            border-radius: 18px; 
            text-align: center; 
            border: 1px solid rgba(255,255,255,0.05);
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 70px;
        }
        .stat-label { font-size: 0.5rem; opacity: 0.5; margin-bottom: 4px; font-weight: 800; text-transform: uppercase; }
        .stat-val { font-weight: 800; font-size: 0.85rem; color: #fff; }
        .stat-count { font-size: 0.65rem; color: var(--accent-purple); margin-top: 2px; font-weight: 700; }
        
        .stat-progress-wrap {
            width: 80%; height: 3px; background: rgba(255,255,255,0.1);
            border-radius: 2px; margin: 6px auto 0 auto; overflow: hidden;
        }
        .stat-progress-bar { height: 100%; width: 0%; transition: width 1.5s cubic-bezier(0.23, 1, 0.32, 1); }

        #toast {
            position: fixed; bottom: 20%; left: 50%; transform: translateX(-50%) translateY(100px);
            background: #fff; color: #000; padding: 12px 24px;
            border-radius: 30px; font-weight: 700; opacity: 0; transition: 0.3s;
            z-index: 1000; pointer-events: none; box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        #installPwaBtn {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--accent-green);
            color: #fff;
            border: none;
            padding: 14px 28px;
            border-radius: 24px;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            display: none;
            align-items: center;
            gap: 8px;
            box-shadow: 0 8px 25px rgba(52, 199, 89, 0.4);
            z-index: 999;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: slideUp 0.4s ease forwards;
        }

        #installPwaBtn.show {
            display: flex;
            transform: translateX(-50%) translateY(0);
        }

        #installPwaBtn:active {
            transform: translateX(-50%) scale(0.98);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateX(-50%) translateY(100px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(10px);
            z-index: 2000;
            display: none;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-overlay.show { display: flex; }

        .modal-content {
            background: var(--bg-color);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 24px;
            max-width: 400px;
            width: 100%;
            max-height: 80vh;
            overflow-y: auto;
            position: relative;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .modal-close {
            background: var(--card-bg);
            border: none;
            color: var(--text-primary);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            font-size: 1.2rem;
            cursor: pointer;
        }

        .analytics-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            border: 1px solid var(--card-border);
        }

        .analytics-label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-bottom: 8px;
            font-weight: 600;
        }

        .analytics-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .calm-index {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
        }

        .calm-index-value {
            font-size: 2.5rem;
            font-weight: 800;
        }

        .calm-index-emoji {
            font-size: 2rem;
        }

        .insight-box {
            background: rgba(191, 90, 242, 0.15);
            border: 1px solid rgba(191, 90, 242, 0.3);
            border-radius: 12px;
            padding: 14px;
            margin-top: 16px;
        }

        .insight-text {
            font-size: 0.9rem;
            color: var(--text-primary);
            line-height: 1.4;
        }

        .breathing-circle {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            margin: 20px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            font-weight: 600;
            color: white;
            animation: breathe 8s infinite ease-in-out;
        }

        @keyframes breathe {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.3); opacity: 1; }
        }

        .breathing-instruction {
            text-align: center;
            font-size: 1.1rem;
            color: var(--text-secondary);
            margin-top: 16px;
        }

        .modal-btn {
            width: 100%;
            padding: 14px;
            border-radius: 16px;
            border: none;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            margin-top: 12px;
            transition: transform 0.2s;
        }

        .modal-btn:active { transform: scale(0.98); }

        .btn-breath {
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            color: white;
        }

        .btn-download {
            background: var(--card-bg);
            color: var(--text-primary);
            border: 1px solid var(--card-border);
        }

        @media (max-height: 700px) {
            .quote-text { font-size: 1.3rem; }
            .timer-display { font-size: 2.4rem; }
            .stat-box { min-height: 65px; }
            .quote-content { padding: 24px 18px; }
        }
    </style>
</head>
<body>
    <button id="installPwaBtn" onclick="installPWA()">📲 Установить приложение</button>

    <div class="quote-card" id="quoteCard">
        <div id="bgLayer"></div>
        <div id="loaderOverlay">
            <div class="loader-msg" id="loaderMsg">Настраиваем фокус...</div>
        </div>
        <div class="quote-content" id="qContent">
            <div class="quote-text" id="qText">...</div>
            <div class="quote-author" id="qAuthor"></div>
        </div>
    </div>

    <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px;">
        <button class="btn-ui" onclick="newQuote()">🎲 Цитата</button>
        <button class="btn-ui" onclick="saveAsImage()">💾 Скрин</button>
        <button class="btn-ui" onclick="openAnalytics()">📊 Анализ</button>
    </div>

    <div class="tracker-section">
        <div class="tracker-controls">
            <button class="btn-work btn-start" id="startBtn" onclick="startCounter()">👔 К ШЕФУ</button>
            <button class="btn-work btn-stop" id="stopBtn" onclick="stopCounter()" disabled>🕊️ СВОБОДЕН</button>
        </div>
        <div class="timer-display" id="timer">00:00:00</div>
        <div class="stats-row">
            <div class="stat-box">
                <div class="stat-label">Сегодня</div>
                <div class="stat-val" id="sDay">00:00:00</div>
                <div class="stat-count" id="cDay">0 раз</div>
                <div class="stat-progress-wrap"><div class="stat-progress-bar" id="pDay" style="background:var(--accent-gold)"></div></div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Неделя</div>
                <div class="stat-val" id="sWeek">00:00</div>
                <div class="stat-count" id="cWeek">0 раз</div>
                <div class="stat-progress-wrap"><div class="stat-progress-bar" id="pWeek" style="background:var(--accent-green)"></div></div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Всего</div>
                <div class="stat-val" id="sTotal">0 дн.</div>
                <div class="stat-count" id="cTotal">0 раз</div>
                <div class="stat-progress-wrap"><div class="stat-progress-bar" id="pTotal" style="background:var(--accent-blue); width:100%"></div></div>
            </div>
        </div>
    </div>

    <div id="toast"></div>

    <div class="modal-overlay" id="analyticsModal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title">📊 Моё состояние</div>
                <button class="modal-close" onclick="closeAnalytics()">✕</button>
            </div>
            
            <div class="calm-index">
                <div class="calm-index-value" id="calmValue">--</div>
                <div class="calm-index-emoji" id="calmEmoji">--</div>
                <div style="margin-left: 10px; font-size: 0.9rem; color: var(--text-secondary);">Индекс спокойствия</div>
            </div>

            <div class="analytics-card">
                <div class="analytics-label">Среднее время сессии</div>
                <div class="analytics-value" id="avgSession">--:--</div>
            </div>

            <div class="analytics-card">
                <div class="analytics-label">Самое беспокойное время</div>
                <div class="analytics-value" id="busyTime">--:--</div>
            </div>

            <div class="insight-box">
                <div class="insight-text" id="insightText">Загрузите данные...</div>
            </div>

            <button class="modal-btn btn-download" onclick="downloadLog()">📥 Скачать лог (CSV)</button>
        </div>
    </div>

    <div class="modal-overlay" id="breathingModal">
        <div class="modal-content" style="text-align: center;">
            <div class="modal-header">
                <div class="modal-title">🌬️ Дыхание</div>
                <button class="modal-close" onclick="closeBreathing()">✕</button>
            </div>
            
            <div class="breathing-circle" id="breathCircle">Вдох</div>
            <div class="breathing-instruction" id="breathInstruction">Следите за кругом</div>
            
            <button class="modal-btn btn-breath" onclick="closeBreathing()">Завершить</button>
        </div>
    </div>

    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <script>
        let deferredPrompt = null;
        const installBtn = document.getElementById('installPwaBtn');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installBtn.classList.add('show');
        });

        window.addEventListener('appinstalled', () => {
            installBtn.classList.remove('show');
            deferredPrompt = null;
            msg('Приложение установлено! 🎉');
        });

        async function installPWA() {
            if (!deferredPrompt) { msg('Установка недоступна'); return; }
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            if (outcome === 'accepted') {
                installBtn.classList.remove('show');
                msg('Установка запущена!');
            }
            deferredPrompt = null;
        }

        let audioContext = null;

        function initAudio() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioContext.state === 'suspended') {
                audioContext.resume();
            }
        }

        function playBossSound() {
            initAudio();
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            oscillator.frequency.setValueAtTime(300, audioContext.currentTime);
            oscillator.frequency.exponentialRampToValueAtTime(150, audioContext.currentTime + 0.3);
            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.3);
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.3);
        }

        function playFreeSound() {
            initAudio();
            const notes = [523.25, 659.25, 783.99];
            notes.forEach((freq, index) => {
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();
                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);
                oscillator.frequency.value = freq;
                oscillator.type = 'sine';
                const startTime = audioContext.currentTime + (index * 0.05);
                gainNode.gain.setValueAtTime(0, startTime);
                gainNode.gain.linearRampToValueAtTime(0.2, startTime + 0.05);
                gainNode.gain.exponentialRampToValueAtTime(0.01, startTime + 0.4);
                oscillator.start(startTime);
                oscillator.stop(startTime + 0.4);
            });
        }

        let startTime = null, timerId = null;
        let bgImageObject = null;
        const storage = JSON.parse(localStorage.getItem('time_data')) || { total: 0, history: [] };
        const WORK_DAY_SEC = 9 * 3600;

        const loadingPhrases = [
            "Ищем вдохновение...",
            "Загружаем мудрость...",
            "Выбираем фон...",
            "Настраиваем фокус...",
            "Слушаем пульс...",
            "Почти готово...",
            "Ещё немного...",
            "Цитата уже близко..."
        ];

        const supportMessages = [
            "Ты вернулся! 💪 Сделай глубокий вдох.",
            "Молодец! 🎯 Время сфокусироваться.",
            "Ты справился! 🌟 Продолжай в том же духе.",
            "Отличная работа! 🔥 Ты контролируешь ситуацию.",
            "Горжусь тобой! 💚 Всё под контролем."
        ];

        const burnoutMessages = [
            "Ты сегодня много общался. Не забудь сделать паузу! 🌿",
            "Важно помнить: твои границы — это нормально. 🛡️",
            "Сделай 5 глубоких вдохов. Ты молодец! 🌬️",
            "Помни: ты не обязан быть доступным 24/7. 💙"
        ];

        const insights = [
            "Обычно утром меньше прерываний — планируй сложные задачи на это время.",
            "Пятница после 15:45 — расслабься и иди бухать.",
            "Среда — самый активный день. Держись! 💪",
            "Твой индекс спокойствия растёт! Продолжай в том же духе.",
            "Замечаешь паттерн? Понедельник утром — время встреч."
        ];

        function formatFullTime(seconds) {
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = seconds % 60;
            return [h, m, s].map(v => v.toString().padStart(2, '0')).join(':');
        }

        function formatHHMM(seconds) {
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            return `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}`;
        }

        function msg(t) {
            const el = document.getElementById('toast');
            el.textContent = t; 
            el.style.opacity = 1;
            el.classList.add('show');
            setTimeout(() => {
                el.style.opacity = 0;
                el.classList.remove('show');
            }, 2000);
        }

        function updateStats() {
            const todayStr = new Date().toDateString();
            const todaySessions = storage.history.filter(i => i.d === todayStr);
            const daySec = todaySessions.reduce((a, b) => a + b.v, 0);
            const dayCount = todaySessions.length;
            
            document.getElementById('sDay').textContent = formatFullTime(daySec);
            document.getElementById('cDay').textContent = dayCount + ' раз';
            document.getElementById('pDay').style.width = Math.min(100, (daySec / WORK_DAY_SEC) * 100) + '%';
            
            const weekAgo = Date.now() - (7 * 24 * 3600 * 1000);
            const weekSessions = storage.history.filter(i => (i.ts || 0) > weekAgo);
            const weekTotal = weekSessions.reduce((a, b) => a + b.v, 0);
            const weekCount = weekSessions.length;
            
            document.getElementById('sWeek').textContent = formatHHMM(weekTotal);
            document.getElementById('cWeek').textContent = weekCount + ' раз';
            document.getElementById('pWeek').style.width = Math.min(100, (weekTotal / (WORK_DAY_SEC * 5)) * 100) + '%';
            
            const uniqueDays = new Set(storage.history.map(i => i.d)).size;
            const totalCount = storage.history.length;
            
            document.getElementById('sTotal').textContent = uniqueDays + ' дн.';
            document.getElementById('cTotal').textContent = totalCount + ' раз';

            if (dayCount >= 8) {
                const randomMsg = burnoutMessages[Math.floor(Math.random() * burnoutMessages.length)];
                setTimeout(() => msg(randomMsg), 3000);
            }
        }

        // ==================== ИСПРАВЛЕННАЯ ФУНКЦИЯ newQuote() ====================
        async function newQuote() {
            const overlay = document.getElementById('loaderOverlay');
            const bg = document.getElementById('bgLayer');
            const content = document.getElementById('qContent');
            const loaderMsg = document.getElementById('loaderMsg');

            overlay.style.opacity = '1';
            content.classList.remove('visible');
            bg.classList.remove('loaded');
            loaderMsg.textContent = "🌍 Загружаем Bing обои...";

            try {
                const bingRes = await fetch('https://www.bing.com/HPImageArchive.aspx?format=js&idx=0&days=1');
                const bingData = await bingRes.json();
                const bingImage = bingData.images[0];
                
                const requestUrl = 'https://www.bing.com' + bingImage.urlbase + '&pid=hp&w=1080&h=1920&rs=1&c=4';
                
                const img = new Image();
                img.crossOrigin = "anonymous";
                img.src = requestUrl;
                
                img.onload = () => {
                    bgImageObject = img;
                    const bgImageUrl = img.src;
                    bg.style.backgroundImage = `url('${bgImageUrl}')`;
                    bg.classList.add('loaded');
                    loaderMsg.textContent = "✨ Готово!";
                    setTimeout(() => {
                        overlay.style.opacity = '0';
                        content.classList.add('visible');
                    }, 400);
                };
                
                // === ИСПРАВЛЕНО: сохраняем fallback вместо null ===
                img.onerror = () => {
                    const fallbackUrl = `https://picsum.photos/1080/1920?random=${Math.random()}`;
                    
                    const fallbackImg = new Image();
                    fallbackImg.crossOrigin = "anonymous";
                    fallbackImg.src = fallbackUrl;
                    
                    fallbackImg.onload = () => {
                        bgImageObject = fallbackImg;
                    };
                    
                    bg.style.backgroundImage = `url('${fallbackUrl}')`;
                    bg.classList.add('loaded');
                    setTimeout(() => {
                        overlay.style.opacity = '0';
                        content.classList.add('visible');
                    }, 400);
                };
            } catch(e) {
                // === ТОЖЕ СОХРАНЯЕМ FALLBACK ===
                const fallbackUrl = `https://picsum.photos/1080/1920?random=${Math.random()}`;
                
                const fallbackImg = new Image();
                fallbackImg.crossOrigin = "anonymous";
                fallbackImg.src = fallbackUrl;
                
                fallbackImg.onload = () => {
                    bgImageObject = fallbackImg;
                };
                
                bg.style.backgroundImage = `url('${fallbackUrl}')`;
                bg.classList.add('loaded');
                overlay.style.opacity = '0';
                content.classList.add('visible');
            }

            try {
                loaderMsg.textContent = "📝 Ищем цитату...";
                
                const controller = new AbortController();
                const timeoutId = setTimeout(() => {
                    controller.abort();
                    console.warn('⏱️ Таймаут 10 сек: цитата не загрузилась');
                }, 10000);
                
                const res = await fetch(
                    'https://api.allorigins.win/get?url=' + encodeURIComponent('http://api.forismatic.com/api/1.0/?method=getQuote&format=json&lang=ru'),
                    { signal: controller.signal }
                );
                
                clearTimeout(timeoutId);
                const d = await res.json();
                const q = JSON.parse(d.contents);
                document.getElementById('qText').textContent = q.quoteText;
                document.getElementById('qAuthor').textContent = "— " + (q.quoteAuthor || "Автор неизвестен");
                
            } catch(e) {
                console.warn('Forismatic не загрузился, используем fallback');
                document.getElementById('qText').textContent = "Ваше время ограничено, не тратьте его, живя чужой жизнью.";
                document.getElementById('qAuthor').textContent = "— Стив Джобс";
            }
            
            overlay.style.opacity = '0';
            content.classList.add('visible');
        }

        function startCounter() {
            if (timerId) return;
            
            playBossSound();
            
            startTime = Date.now();
            localStorage.setItem('active_start', startTime);
            
            document.getElementById('startBtn').disabled = true;
            const stopBtn = document.getElementById('stopBtn');
            stopBtn.disabled = false;
            stopBtn.classList.add('active-stop');

            timerId = setInterval(() => {
                const s = Math.floor((Date.now() - startTime) / 1000);
                document.getElementById('timer').textContent = formatFullTime(s);
            }, 1000);
        }

        // ==================== ИСПРАВЛЕННАЯ ФУНКЦИЯ stopCounter() ====================
        function stopCounter() {
            if (!startTime) return;
            
            playFreeSound();
            
            const diff = Math.floor((Date.now() - startTime) / 1000);
            clearInterval(timerId);
            timerId = null;
            
            storage.total += diff;
            storage.history.push({ d: new Date().toDateString(), v: diff, ts: Date.now() });
            localStorage.setItem('time_data', JSON.stringify(storage));
            localStorage.removeItem('active_start');
            
            document.getElementById('startBtn').disabled = false;
            document.getElementById('stopBtn').disabled = true;
            document.getElementById('stopBtn').classList.remove('active-stop');
            document.getElementById('timer').textContent = '00:00:00';
            
            updateStats();
            startTime = null;
            
            const supportMsg = supportMessages[Math.floor(Math.random() * supportMessages.length)];
            msg(supportMsg);
            
            // === УБРАЛ newQuote() - фон НЕ меняется ===
        }

        // ==================== СКРИНШОТ С СОХРАНЁННЫМ ИЗОБРАЖЕНИЕМ ====================
        function saveAsImage() {
            msg("📸 Создаем фото...");
            
            if (!bgImageObject) {
                msg("❌ Фон не загружен");
                return;
            }
            
            const quoteText = document.getElementById('qText').textContent;
            const quoteAuthor = document.getElementById('qAuthor').textContent;
            
            const canvas = document.createElement('canvas');
            canvas.width = 1080;
            canvas.height = 1920;
            const ctx = canvas.getContext('2d');
            
            // === РИСУЕМ ТОТ ЖЕ ОБЪЕКТ ЧТО НА ЭКРАНЕ ===
            ctx.drawImage(bgImageObject, 0, 0, 1080, 1920);
            
            const gradient = ctx.createLinearGradient(0, 1920, 0, 960);
            gradient.addColorStop(0, 'rgba(0,0,0,0.95)');
            gradient.addColorStop(0.5, 'rgba(0,0,0,0.6)');
            gradient.addColorStop(1, 'rgba(0,0,0,0.2)');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 1080, 1920);
            
            ctx.fillStyle = 'rgba(255,255,255,0.15)';
            ctx.font = 'bold 200px "Playfair Display"';
            ctx.fillText('"', 40, 180);
            
            ctx.fillStyle = '#ffffff';
            ctx.font = 'italic 52px "Playfair Display"';
            ctx.textAlign = 'left';
            ctx.shadowColor = 'rgba(0,0,0,0.8)';
            ctx.shadowBlur = 10;
            
            const words = quoteText.split(' ');
            let line = '';
            let y = 1300;
            const maxWidth = 960;
            const lineHeight = 70;
            
            for (let n = 0; n < words.length; n++) {
                const testLine = line + words[n] + ' ';
                const metrics = ctx.measureText(testLine);
                if (metrics.width > maxWidth && n > 0) {
                    ctx.fillText(line, 60, y);
                    line = words[n] + ' ';
                    y += lineHeight;
                } else {
                    line = testLine;
                }
            }
            ctx.fillText(line, 60, y);
            
            ctx.font = '600 36px "Inter"';
            ctx.fillStyle = 'rgba(255,255,255,0.7)';
            ctx.textAlign = 'right';
            ctx.shadowBlur = 8;
            ctx.fillText(quoteAuthor, 1020, 1550);
            
            const link = document.createElement('a');
            link.download = `focus_${Date.now()}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
            msg("✅ Готово!");
        }

        function openAnalytics() {
            const modal = document.getElementById('analyticsModal');
            modal.classList.add('show');
            
            const todayStr = new Date().toDateString();
            const todaySessions = storage.history.filter(i => i.d === todayStr);
            const todayCount = todaySessions.length;
            const todaySec = todaySessions.reduce((a, b) => a + b.v, 0);
            const avgSec = todayCount > 0 ? Math.floor(todaySec / todayCount) : 0;
            
            let calmIndex = Math.max(1, Math.min(10, 10 - Math.floor(todayCount / 2)));
            if (todaySec > 4 * 3600) calmIndex = Math.min(calmIndex, 4);
            
            const emojis = ['😰', '😟', '😐', '🙂', '😊', '😌', '🧘', '😌', '😊', '🧘‍♂️'];
            document.getElementById('calmValue').textContent = calmIndex + '/10';
            document.getElementById('calmEmoji').textContent = emojis[calmIndex - 1];
            
            document.getElementById('avgSession').textContent = avgSec > 0 ? formatFullTime(avgSec) : '--:--';
            
            const hourCounts = {};
            storage.history.forEach(s => {
                const hour = new Date(s.ts).getHours();
                hourCounts[hour] = (hourCounts[hour] || 0) + 1;
            });
            const busyHour = Object.entries(hourCounts).sort((a, b) => b[1] - a[1])[0];
            document.getElementById('busyTime').textContent = busyHour ? `${busyHour[0]}:00` : '--:--';
            
            const insight = insights[Math.floor(Math.random() * insights.length)];
            document.getElementById('insightText').textContent = insight;
        }

        function closeAnalytics() {
            document.getElementById('analyticsModal').classList.remove('show');
        }

        let breathInterval = null;
        
        function openBreathing() {
            const modal = document.getElementById('breathingModal');
            modal.classList.add('show');
            
            const circle = document.getElementById('breathCircle');
            const instruction = document.getElementById('breathInstruction');
            
            let isInhale = true;
            circle.textContent = 'Вдох';
            instruction.textContent = 'Вдыхайте через нос...';
            
            breathInterval = setInterval(() => {
                isInhale = !isInhale;
                if (isInhale) {
                    circle.textContent = 'Вдох';
                    instruction.textContent = 'Вдыхайте через нос...';
                } else {
                    circle.textContent = 'Выдох';
                    instruction.textContent = 'Выдыхайте через рот...';
                }
            }, 4000);
        }

        function closeBreathing() {
            clearInterval(breathInterval);
            document.getElementById('breathingModal').classList.remove('show');
            msg('🧘 Отличная работа!');
        }

        function downloadLog() {
            if (storage.history.length === 0) {
                msg('❌ Нет данных для выгрузки');
                return;
            }
            
            let csv = 'Дата,Время начала,Длительность (сек),Длительность\n';
            storage.history.forEach(s => {
                const date = new Date(s.ts);
                const timeStr = date.toLocaleTimeString('ru-RU');
                csv += `${s.d},${timeStr},${s.v},${formatFullTime(s.v)}\n`;
            });
            
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `time_log_${new Date().toISOString().split('T')[0]}.csv`;
            link.click();
            
            msg('✅ Лог скачан!');
            closeAnalytics();
        }

        window.onload = () => {
            newQuote();
            updateStats();

            const active = localStorage.getItem('active_start');
            if(active) {
                startTime = parseInt(active);
                document.getElementById('startBtn').disabled = true;
                const stopBtn = document.getElementById('stopBtn');
                stopBtn.disabled = false;
                stopBtn.classList.add('active-stop');
                timerId = setInterval(() => {
                    const s = Math.floor((Date.now() - startTime) / 1000);
                    document.getElementById('timer').textContent = formatFullTime(s);
                }, 1000);
            }

            if ('serviceWorker' in navigator) {
                const isLocalhost = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
                const isHttps = window.location.protocol === 'https:';
                if (isHttps || isLocalhost) {
                    navigator.serviceWorker.register('service-worker.js')
                        .then(reg => console.log('✅ SW зарегистрирован:', reg.scope))
                        .catch(err => console.warn('⚠️ Ошибка SW:', err));
                }
            }
        };
    </script>
