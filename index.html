<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1e3c72">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Цитаты">
    
    <link rel="apple-touch-icon" href="icon-192.png">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <title>Цитаты и Время</title>
    
    <link rel="manifest" href="manifest.json">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        :root {
            --bg-color: #1a1b26;
            --card-bg: rgba(255, 255, 255, 0.08);
            --card-border: rgba(255, 255, 255, 0.1);
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.6);
            --accent-red: #ff3b30;
            --accent-green: #34c759;
            --accent-gold: #ffd60a;
        }

        [data-theme="light"] {
            --bg-color: #f0f2f5;
            --card-bg: rgba(0, 0, 0, 0.05);
            --card-border: rgba(0, 0, 0, 0.1);
            --text-primary: #1c1c1e;
            --text-secondary: rgba(0, 0, 0, 0.5);
            --accent-gold: #b8860b;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            padding: 12px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            gap: 10px;
            color: var(--text-primary);
            overflow: hidden;
            transition: background-color 0.4s ease;
        }

        .quote-card {
            position: relative;
            border-radius: 24px;
            overflow: hidden;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            background-color: #000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        #bgLayer {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center;
            transition: opacity 0.8s ease;
            z-index: 0;
        }

        .quote-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.2) 60%, transparent 100%);
            z-index: 1;
        }

        .quote-content {
            position: relative;
            z-index: 2;
            padding: 28px;
            transition: opacity 0.5s ease;
        }

        .quote-text {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 1.5rem;
            line-height: 1.35;
            margin-bottom: 12px;
            color: #fff;
            text-shadow: 0 2px 15px rgba(0,0,0,0.8);
        }

        .quote-author {
            font-size: 0.95rem;
            text-align: right;
            opacity: 0.9;
            font-weight: 600;
            color: #fff;
        }

        .main-nav {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .btn-ui {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            padding: 14px;
            border-radius: 16px;
            color: var(--text-primary);
            font-weight: 600;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            backdrop-filter: blur(10px);
        }

        .tracker-section {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 18px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            border: 1px solid var(--card-border);
        }

        .tracker-controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .btn-work {
            padding: 16px;
            border-radius: 16px;
            border: none;
            color: white;
            font-weight: 800;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-start { background: var(--accent-red); box-shadow: 0 4px 15px rgba(255, 59, 48, 0.3); }
        .btn-stop { background: rgba(150, 150, 150, 0.2); color: var(--text-secondary); }
        .active-stop { background: var(--accent-green) !important; color: white !important; box-shadow: 0 4px 15px rgba(52, 199, 89, 0.3); }

        .timer-display {
            font-size: 3.2rem;
            font-weight: 700;
            text-align: center;
            color: var(--accent-gold);
            font-family: 'Inter', monospace;
            letter-spacing: -1px;
        }

        .stats-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .stat-box {
            background: rgba(0, 0, 0, 0.1);
            padding: 12px 6px;
            border-radius: 14px;
            text-align: center;
        }

        .stat-label {
            font-size: 0.6rem;
            color: var(--text-secondary);
            margin-bottom: 4px;
            letter-spacing: 1px;
        }

        .stat-val {
            font-size: 1rem;
            font-weight: 700;
        }

        #loader {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            display: none;
        }

        .spinner {
            width: 36px; height: 36px;
            border: 4px solid rgba(255,255,255,0.1);
            border-top-color: var(--accent-gold);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        #toast {
            position: fixed; top: 30px; left: 50%;
            transform: translateX(-50%);
            background: var(--text-primary); color: var(--bg-color);
            padding: 12px 24px; border-radius: 30px;
            font-size: 0.9rem; font-weight: 700;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            opacity: 0; transition: 0.4s; z-index: 1000;
            pointer-events: none;
        }

        .theme-toggle {
            position: absolute; top: 15px; right: 15px;
            z-index: 100; background: rgba(0,0,0,0.3);
            border: none; border-radius: 50%;
            width: 40px; height: 40px; color: white;
            cursor: pointer; font-size: 1.2rem;
        }
    </style>
</head>
<body data-theme="dark">

    <button class="theme-toggle" onclick="toggleTheme()">🌓</button>

    <div class="quote-card" id="quoteCard">
        <div id="bgLayer"></div>
        <div id="loader"><div class="spinner"></div></div>
        <div class="quote-content" id="quoteContent">
            <div class="quote-text" id="quoteText">Единственный настоящий успех — иметь возможность жить так, как тебе хочется.</div>
            <div class="quote-author" id="quoteAuthor">— Кристофер Морли</div>
        </div>
    </div>

    <div class="main-nav">
        <button class="btn-ui" onclick="newQuote()">🎲 Новая</button>
        <button class="btn-ui" onclick="saveAsImage()">💾 Скачать</button>
    </div>

    <div class="tracker-section">
        <div class="tracker-controls">
            <button class="btn-work btn-start" id="startBtn" onclick="startCounter()">👔 К ШЕФУ</button>
            <button class="btn-work btn-stop" id="stopBtn" onclick="stopCounter()" disabled>🕊️ СВОБОДЕН</button>
        </div>
        <div class="timer-display" id="timer">00:00</div>
        <div class="stats-row">
            <div class="stat-box">
                <div class="stat-label">СЕГОДНЯ</div>
                <div class="stat-val" id="statToday">0м</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">НЕДЕЛЯ</div>
                <div class="stat-val" id="statWeek">0м</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">ВСЕГО</div>
                <div class="stat-val" id="statTotal">0м</div>
            </div>
        </div>
    </div>

    <div id="toast">Сохранено</div>

    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <script>
        // Service Worker Registration
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('service-worker.js').catch(() => {});
            });
        }

        let timerId = null;
        let startTime = null;
        let storage = JSON.parse(localStorage.getItem('user_time_data')) || { total: 0, history: [] };

        function updateBg() {
            const bg = document.getElementById('bgLayer');
            const finalUrl = `https://picsum.photos/1080/1920?random=${Math.random()}`;
            const tempImg = new Image();
            tempImg.crossOrigin = "anonymous";
            tempImg.src = finalUrl;
            tempImg.onload = () => {
                bg.style.backgroundImage = `url('${finalUrl}')`;
                document.getElementById('loader').style.display = 'none';
                document.getElementById('quoteContent').style.opacity = '1';
            };
        }

        async function newQuote() {
            document.getElementById('loader').style.display = 'block';
            document.getElementById('quoteContent').style.opacity = '0';
            try {
                const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent('http://api.forismatic.com/api/1.0/?method=getQuote&format=json&lang=ru&key=' + Math.floor(Math.random()*99999))}`);
                const data = await res.json();
                const quote = JSON.parse(data.contents);
                document.getElementById('quoteText').textContent = quote.quoteText;
                document.getElementById('quoteAuthor').textContent = "— " + (quote.quoteAuthor || "Неизвестный автор");
            } catch (e) {
                document.getElementById('quoteText').textContent = "Успех — это движение от неудачи к неудаче без потери энтузиазма.";
                document.getElementById('quoteAuthor').textContent = "— Уинстон Черчилль";
            }
            updateBg();
        }

        function playSound(freq1, freq2) {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const g = ctx.createGain();
                osc.connect(g); g.connect(ctx.destination);
                osc.frequency.setValueAtTime(freq1, ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(freq2, ctx.currentTime + 0.2);
                g.gain.setValueAtTime(0.1, ctx.currentTime);
                g.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.2);
                osc.start(); osc.stop(ctx.currentTime + 0.2);
            } catch(e) {}
        }

        function startCounter() {
            playSound(400, 800);
            startTime = Date.now();
            localStorage.setItem('counter_running_since', startTime);
            document.getElementById('startBtn').disabled = true;
            document.getElementById('stopBtn').disabled = false;
            document.getElementById('stopBtn').classList.add('active-stop');
            timerId = setInterval(() => {
                const diff = Math.floor((Date.now() - startTime) / 1000);
                const m = Math.floor(diff / 60);
                const s = diff % 60;
                document.getElementById('timer').textContent = `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
            }, 1000);
        }

        function stopCounter() {
            playSound(600, 300);
            const duration = Math.floor((Date.now() - startTime) / 1000);
            clearInterval(timerId);
            storage.total += duration;
            storage.history.push({ date: new Date().toDateString(), val: duration });
            localStorage.setItem('user_time_data', JSON.stringify(storage));
            localStorage.removeItem('counter_running_since');
            document.getElementById('startBtn').disabled = false;
            document.getElementById('stopBtn').disabled = true;
            document.getElementById('stopBtn').classList.remove('active-stop');
            document.getElementById('timer').textContent = "00:00";
            refreshStats();
            msg("Время сохранено");
        }

        function refreshStats() {
            const today = new Date().toDateString();
            const todaySec = storage.history.filter(i => i.date === today).reduce((acc, curr) => acc + curr.val, 0);
            document.getElementById('statToday').textContent = Math.round(todaySec / 60) + 'м';
            document.getElementById('statTotal').textContent = Math.round(storage.total / 60) + 'м';
            document.getElementById('statWeek').textContent = Math.round(storage.total / 60) + 'м';
        }

        function msg(text) {
            const t = document.getElementById('toast');
            t.textContent = text; t.style.opacity = '1';
            setTimeout(() => t.style.opacity = '0', 2000);
        }

        function toggleTheme() {
            const b = document.body;
            const current = b.getAttribute('data-theme');
            b.setAttribute('data-theme', current === 'dark' ? 'light' : 'dark');
        }

        function saveAsImage() {
            msg("Генерация фото...");
            const node = document.getElementById('quoteCard');
            html2canvas(node, {
                useCORS: true,
                allowTaint: false,
                backgroundColor: "#000",
                scale: 2,
                onclone: (clonedDoc) => {
                    clonedDoc.getElementById('quoteContent').style.opacity = '1';
                }
            }).then(canvas => {
                try {
                    const link = document.createElement('a');
                    link.download = `quote_${Date.now()}.png`;
                    link.href = canvas.toDataURL("image/png");
                    link.click();
                    msg("Сохранено!");
                } catch (e) {
                    msg("Ошибка записи");
                }
            });
        }

        window.onload = () => {
            updateBg();
            refreshStats();
            const active = localStorage.getItem('counter_running_since');
            if (active) { startTime = parseInt(active); startCounter(); }
        };
    </script>
</body>
</html>
